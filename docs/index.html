<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>dsa.solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --border2: rgba(255,255,255,0.12);
  --accent: #7c6af7;
  --accent-glow: rgba(124,106,247,0.12);
  --accent2: #f97316;
  --easy: #22c55e;
  --medium: #f59e0b;
  --hard: #ef4444;
  --text: #e2e8f0;
  --muted: #4a4a6a;
  --card: #13131f;
  --font: 'Syne', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
header {
  padding: 56px 0 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}

.logo {
  font-family: var(--font);
  font-weight: 800;
  font-size: 2.4rem;
  letter-spacing: -0.03em;
  line-height: 1;
}

.logo span { color: var(--accent); }

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.gh-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: all 0.2s;
  font-family: var(--mono);
}

.gh-link:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-glow);
}

.updated {
  font-size: 0.72rem;
  color: var(--muted);
}

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 48px;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  transition: border-color 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
}

.stat:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.stat::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}

.stat:hover::after { opacity: 1; }

.stat-val {
  font-family: var(--font);
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 8px;
}

.stat-val.easy { color: var(--easy); }
.stat-val.medium { color: var(--medium); }
.stat-val.hard { color: var(--hard); }
.stat-val.accent { color: var(--accent); }

.stat-lbl {
  font-size: 0.68rem;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
}

/* ── Section heading ── */
.sec-head {
  font-family: var(--font);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.sec-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Two col ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 48px;
}

@media (max-width: 640px) {
  .two-col { grid-template-columns: 1fr; }
  .logo { font-size: 1.8rem; }
  .stat-val { font-size: 1.8rem; }
}

/* ── Card shell ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
}

/* ── Diff bars ── */
.diff-item {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.diff-item:last-child { margin-bottom: 0; }

.diff-name {
  font-size: 0.72rem;
  font-weight: 500;
  width: 56px;
  letter-spacing: 0.04em;
}

.diff-name.easy { color: var(--easy); }
.diff-name.medium { color: var(--medium); }
.diff-name.hard { color: var(--hard); }

.diff-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.diff-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}

.diff-fill.easy { background: var(--easy); }
.diff-fill.medium { background: var(--medium); }
.diff-fill.hard { background: var(--hard); }

.diff-n {
  font-size: 0.78rem;
  font-weight: 500;
  width: 22px;
  text-align: right;
  color: var(--muted);
}

/* ── Tags ── */
.tags-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag-chip {
  font-size: 0.72rem;
  font-weight: 400;
  padding: 5px 11px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
}

.tag-chip:hover, .tag-chip.active {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-glow);
}

.tag-chip .cnt {
  font-size: 0.65rem;
  color: var(--accent);
  font-weight: 500;
}

/* ── Patterns ── */
.patterns-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
  margin-bottom: 48px;
}

.pat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.pat-card:hover, .pat-card.active {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.pat-name {
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
}

.pat-cnt {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ── Calendar ── */
.cal-wrap {
  overflow-x: auto;
  padding-bottom: 4px;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.search {
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 9px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  outline: none;
  width: 260px;
  transition: border-color 0.2s;
}

.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }

.fpill {
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}

.fpill:hover, .fpill.on {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-glow);
}

/* ── Problem cards ── */
#problem-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.pc {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.pc:hover { border-color: var(--border2); }
.pc.open { border-color: var(--accent); }

.ph {
  display: grid;
  grid-template-columns: 1fr auto auto auto auto;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}

.pt {
  font-family: var(--font);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.pt span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.pnum {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  flex-shrink: 0;
}

.badge {
  font-size: 0.65rem;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 5px;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  font-family: var(--mono);
}

.badge.Easy { background: rgba(34,197,94,0.1); color: var(--easy); }
.badge.Medium { background: rgba(245,158,11,0.1); color: var(--medium); }
.badge.Hard { background: rgba(239,68,68,0.1); color: var(--hard); }

.ppat {
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 3px 9px;
  border-radius: 5px;
  flex-shrink: 0;
  white-space: nowrap;
  font-family: var(--mono);
}

.prt {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  flex-shrink: 0;
}

.pchev {
  color: var(--muted);
  transition: transform 0.25s;
  flex-shrink: 0;
  font-size: 1rem;
}

.pc.open .pchev { transform: rotate(180deg); }

/* ── Detail panel ── */
.pd {
  display: none;
  border-top: 1px solid var(--border);
}

.pc.open .pd { display: block; }

.pd-inner {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 700px) {
  .pd-inner { grid-template-columns: 1fr; }
  .ph { grid-template-columns: 1fr auto auto; }
  .ppat, .prt { display: none; }
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.panel-head {
  padding: 10px 14px;
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--mono);
}

.panel-body { padding: 14px; }

.rev-btn {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 4px 10px;
  border: 1px solid var(--accent);
  border-radius: 6px;
  background: var(--accent-glow);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}

.rev-btn:hover {
  background: var(--accent);
  color: #fff;
}

.locked {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px 12px;
  text-align: center;
}

.locked p {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.6;
}

.lock-icon {
  font-size: 1.4rem;
  color: var(--muted);
}

.revealed { display: none; }
.revealed.shown { display: block; }

.hint-steps {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.hint-steps li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.72rem;
  color: var(--text);
  line-height: 1.7;
}

.snum {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 0.6rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  font-family: var(--mono);
}

.cx-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.cx {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 3px 8px;
  border-radius: 5px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.cx em {
  color: var(--muted);
  font-size: 0.6rem;
  font-style: normal;
  opacity: 0.6;
}

.improve {
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(249,115,22,0.06);
  border: 1px solid rgba(249,115,22,0.2);
  border-radius: 8px;
  font-size: 0.68rem;
  color: var(--text);
  line-height: 1.6;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 12px;
}

.t-chip {
  font-size: 0.62rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--card);
  color: var(--muted);
  border: 1px solid var(--border);
  font-family: var(--mono);
}

.code-block {
  background: var(--bg);
  border-radius: 7px;
  overflow: auto;
  max-height: 300px;
  font-family: var(--mono);
  font-size: 0.68rem;
  line-height: 1.65;
  color: var(--text);
  padding: 14px;
  white-space: pre;
  border: 1px solid var(--border);
}

.p-links {
  display: flex;
  gap: 10px;
  padding: 0 20px 16px;
}

.lc-link {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--accent);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border: 1px solid var(--accent);
  border-radius: 8px;
  background: var(--accent-glow);
  transition: all 0.15s;
  font-family: var(--mono);
}

.lc-link:hover {
  background: var(--accent);
  color: #fff;
}

.empty {
  text-align: center;
  padding: 60px;
  color: var(--muted);
  font-size: 0.8rem;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

  <header>
    <div class="logo">dsa<span>.</span>solutions</div>
    <div class="header-right">

<script>
const DATA = {"stats": {"total": 22, "total_submissions": 22, "difficulty": {"Easy": 9, "Medium": 11, "Hard": 2}, "tags": [["Array", 13], ["Two Pointers", 11], ["Linked List", 8], ["Stack", 7], ["Monotonic Stack", 6], ["Hash Table", 3], ["Recursion", 2], ["Dynamic Programming", 2], ["Simulation", 1], ["String", 1], ["Greedy", 1], ["Math", 1], ["Divide and Conquer", 1], ["Sorting", 1], ["Merge Sort", 1]], "patterns": [["Two Pointers", 10], ["Monotonic Stack", 6], ["Linear Scan", 1], ["Iterative Approach", 1], ["Recursion", 1], ["Array Manipulation", 1], ["In-place Array Manipulation", 1], ["Merge Sort", 1]], "calendar": {"2026-04-09": 2, "2026-03-31": 6, "2026-05-18": 1, "2026-05-17": 6, "2026-04-06": 3, "2026-04-04": 1, "2026-04-03": 1, "2026-04-07": 1, "2026-04-08": 1}}, "problems": [{"title": "Max Consecutive Ones", "titleSlug": "max-consecutive-ones", "difficulty": "Easy", "tags": ["Array"], "runtime": 1, "memory": 50.4, "timestamp": 1779068773, "submissionCount": 1, "pattern": "Linear Scan", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the array while maintaining a count of the current consecutive ones. Whenever a zero is encountered, it compares the current count with the maximum found so far and resets the current count.", "improvements": null, "relatedPatterns": ["Sliding Window"], "solutionCode": "public class Solution {\n    public int FindMaxConsecutiveOnes(int[] nums) {\n        int max=0, curr = 0, n = nums.Length;\n        for(int i=0;i<n;i++){\n            if(nums[i]!=1){\n                if(curr>max){\n                    max = curr;\n                }\n                curr=0;\n            }\n            else{\n                curr++;\n            }\n        }\n        return curr>max?curr:max;\n    }\n}", "solutionExt": "cs"}, {"title": "Rotate Array", "titleSlug": "rotate-array", "difficulty": "Medium", "tags": ["Array", "Math", "Two Pointers"], "runtime": 0, "memory": 64.7, "timestamp": 1779048947, "submissionCount": 1, "pattern": "Array Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses the reverse method to rotate the array in three steps: first reversing the first part, then the second part, and finally the entire array. This approach effectively rearranges the elements in place without needing extra space.", "improvements": null, "relatedPatterns": ["In-place Algorithm", "Reversal Algorithm"], "solutionCode": "public class Solution {\n    public void Rotate(int[] nums, int k) {\n        int n = nums.Length;\n        if(n<=1) return;\n        k%=n;\n\n        Array.Reverse(nums,0,n-k);\n        Array.Reverse(nums,n-k,k);\n        Array.Reverse(nums, 0, n);\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Duplicates from Sorted Array II", "titleSlug": "remove-duplicates-from-sorted-array-ii", "difficulty": "Medium", "tags": ["Array", "Two Pointers"], "runtime": 143, "memory": 53.1, "timestamp": 1779025647, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique where one pointer iterates through the array while the other keeps track of the position to insert unique elements. It allows for in-place modification of the array while ensuring that no more than two duplicates are retained.", "improvements": null, "relatedPatterns": ["Array Manipulation"], "solutionCode": "public class Solution {\n    public int RemoveDuplicates(int[] nums) {\n        if (nums.Length <= 2)\n        return nums.Length;\n\n        int n = nums.Length, x = 2;\n        for(int i=2;i<n;i++){\n            if(nums[i]!=nums[x-2]){\n                nums[x] = nums[i];\n                x++;\n            }\n        }\n        return x;\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Duplicates from Sorted Array", "titleSlug": "remove-duplicates-from-sorted-array", "difficulty": "Easy", "tags": ["Array", "Two Pointers"], "runtime": 0, "memory": 51.6, "timestamp": 1779024047, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique where one pointer tracks the position of unique elements and the other iterates through the array. When a new unique element is found, it is placed at the next position of the unique pointer, effectively removing duplicates in place.", "improvements": null, "relatedPatterns": ["Array Manipulation", "In-place Algorithm"], "solutionCode": "public class Solution {\n    public int RemoveDuplicates(int[] nums) {\n        int x = 0, n = nums.Length;\n        for(int i=0;i<n;i++){\n            if(nums[x]!=nums[i]){\n                x+=1;\n                nums[x] = nums[i];\n            }\n        }\n        return x+1;\n    }\n}", "solutionExt": "cs"}, {"title": "Shuffle the Array", "titleSlug": "shuffle-the-array", "difficulty": "Easy", "tags": ["Array"], "runtime": 138, "memory": 49.4, "timestamp": 1779023512, "submissionCount": 1, "pattern": "In-place Array Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses an in-place approach to shuffle the array by encoding two values into a single position using a modulus operation. It first modifies the array to store both original and shuffled values, then decodes them in a second pass.", "improvements": null, "relatedPatterns": ["Array Manipulation", "Two Pointers"], "solutionCode": "public class Solution {\n    public int[] Shuffle(int[] nums, int n) {\n        int maxVal = 1001;\n        for(int i = n-1;i>=0;i--){\n            nums[2*i+1] += (nums[n+i]%maxVal)*maxVal;\n            nums[2*i]+=(nums[i]%maxVal)*maxVal;\n        }\n        \n        for(int i=0;i<2*n;i++){\n            nums[i]/=maxVal;\n        }\n        return nums;\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Element", "titleSlug": "remove-element", "difficulty": "Easy", "tags": ["Array", "Two Pointers"], "runtime": 0, "memory": 46.5, "timestamp": 1778997808, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique where one pointer iterates through the array and the other keeps track of the position to place elements that are not equal to the target value. When a non-target value is found, it is swapped with the value at the 'k' pointer, effectively removing the target values in place.", "improvements": null, "relatedPatterns": ["In-place Modification", "Partitioning"], "solutionCode": "public class Solution {\n    public int RemoveElement(int[] nums, int val) {\n        int n = nums.Length, k=0;\n\n        for(int i = 0;i<n;i++){\n            if(nums[i]!=val){\n                if(i!=k){\n                    (nums[i], nums[k])=(nums[k], nums[i]);\n                }\n                k++;\n            }\n        }\n        return k;\n    }\n}", "solutionExt": "cs"}, {"title": "Move Zeroes", "titleSlug": "move-zeroes", "difficulty": "Easy", "tags": ["Array", "Two Pointers"], "runtime": 1, "memory": 58.1, "timestamp": 1778996274, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique where one pointer tracks the position of non-zero elements and the other iterates through the array. When a non-zero element is found, it is swapped with the element at the non-zero pointer, effectively moving all zeros to the end of the array.", "improvements": null, "relatedPatterns": ["In-place swapping", "Partitioning"], "solutionCode": "public class Solution {\n    public void MoveZeroes(int[] nums) {\n        int nonZero = 0;\n        for(int i= 0;i<nums.Length;i++){\n            if(nums[i]!=0){\n                (nums[i], nums[nonZero]) = (nums[nonZero], nums[i]);\n                nonZero++;\n            }\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Remove K Digits", "titleSlug": "remove-k-digits", "difficulty": "Medium", "tags": ["String", "Stack", "Greedy", "Monotonic Stack"], "runtime": 10, "memory": 45.3, "timestamp": 1775710424, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a monotonic stack to maintain the digits in increasing order while iterating through the number. It removes digits from the stack when the current digit is smaller than the top of the stack and there are still digits to remove (k > 0).", "improvements": "Consider using a StringBuilder instead of a Stack for potentially better performance in string manipulation.", "relatedPatterns": ["Greedy", "Stack"], "solutionCode": "public class Solution {\n    public string RemoveKdigits(string num, int k) {\n        if(k>=num.Length) return \"0\";\n        int n = num.Length; Stack<char> st = new Stack<char>();\n\n        for(int i=0;i<n;i++){\n            while(k>0 && st.Count!=0 && st.Peek()>num[i]){\n                st.Pop();k-=1;\n            }\n            st.Push(num[i]);\n        }\n\n        while(k>0){\n            st.Pop();k-=1;\n        }\n\n        var result = new string(st.Reverse().ToArray());\n        result = result.TrimStart('0');\n\n        return result == \"\"?\"0\":result;\n        \n    }\n}", "solutionExt": "cs"}, {"title": "Asteroid Collision", "titleSlug": "asteroid-collision", "difficulty": "Medium", "tags": ["Array", "Stack", "Simulation"], "runtime": 7, "memory": 50.7, "timestamp": 1775708382, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a stack to simulate the collision of asteroids. Positive asteroids are pushed onto the stack, and when a negative asteroid is encountered, collisions are resolved based on their sizes until no further collisions occur or the stack is empty.", "improvements": "Consider using a List instead of a Stack for potentially better performance with dynamic resizing, or null if optimal", "relatedPatterns": ["Stack", "Simulation"], "solutionCode": "public class Solution {\n    public int[] AsteroidCollision(int[] asteroids) {\n        Stack<int> st = new Stack<int>();\n\n        foreach (var item in asteroids) {\n            int curr = item;\n\n            while (st.Count != 0 && st.Peek() > 0 && curr < 0) {\n                if (st.Peek() + curr < 0) {\n                    st.Pop();\n                }\n                else if (st.Peek() + curr == 0) {\n                    st.Pop();\n                    curr = 0;\n                    break;\n                }\n                else {\n                    curr = 0;\n                    break;\n                }\n            }\n\n            if (curr != 0) {\n                st.Push(curr);\n            }\n        }\n\n        return st.Reverse().ToArray();\n    }\n}", "solutionExt": "cs"}, {"title": "Sum of Subarray Ranges", "titleSlug": "sum-of-subarray-ranges", "difficulty": "Medium", "tags": ["Array", "Stack", "Monotonic Stack"], "runtime": 12, "memory": 43.9, "timestamp": 1775625324, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses monotonic stacks to efficiently find the next and previous smaller and greater elements for each element in the array. This allows the calculation of contributions to the sum of subarray ranges in linear time.", "improvements": null, "relatedPatterns": ["Stack", "Sliding Window"], "solutionCode": "public class Solution {\n    public long SubArrayRanges(int[] nums) {\n        int[] nse = findNse(nums);\n        int[] psee = findPsee(nums);\n        int[] nge = findNge(nums);\n        int[] pgee = findPgee(nums);\n\n        int n = nums.Length;long sum = 0;\n\nfor(int i = 0; i < n; i++){\n    long smallLeft = i - psee[i];\n    long smallRight = nse[i] - i;\n    long largeLeft = i - pgee[i];\n    long largeRight = nge[i] - i;\n\n    long smallContribution = smallLeft * smallRight * nums[i];\n    long largeContribution = largeLeft * largeRight * nums[i];\n\n    sum += (largeContribution - smallContribution);\n}\n\n        return sum;\n    }\n\n    int[] findNse(int[] arr){\n        int n = arr.Length;int i = n-1; \n        Stack<int> st = new Stack<int>();\n        int[] nse = new int[n];\n        while(i>=0){\n            while(st.Count!=0 && arr[st.Peek()]>=arr[i]){\n                st.Pop();\n            }\n\n            nse[i] = st.Count==0?n:st.Peek();\n            st.Push(i);\n            i-=1;\n        }\n        return nse;\n    }\n\n    int[] findPsee(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n=arr.Length; int[] psee = new int[n];\n\n        for(int i=0;i<n;i++){\n            while(st.Count!=0 && arr[st.Peek()]>arr[i]){\n                st.Pop();\n            }\n            psee[i] = st.Count==0?-1:st.Peek();\n            st.Push(i);\n        }\n        return psee;\n    }\n\n    int[] findNge(int[] arr){\n        Stack<int> st = new Stack<int>();int n = arr.Length;\n        int[] nge = new int[n];int i = n-1;\n\n        while(i>=0){\n            while(st.Count!=0 && arr[st.Peek()]<=arr[i]){\n                st.Pop();\n            }\n            nge[i] = st.Count==0?n:st.Peek();\n            st.Push(i);\n            i-=1;\n        }\n\n        return nge;\n    }\n\n    int[] findPgee(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n=arr.Length; int[] pgee = new int[n];\n\n        for(int i=0;i<n;i++){\n            while(st.Count!=0 && arr[st.Peek()]<arr[i]){\n                st.Pop();\n            }\n            pgee[i] = st.Count==0?-1:st.Peek();\n            st.Push(i);\n        }\n        return pgee;\n    }\n}", "solutionExt": "cs"}, {"title": "Sum of Subarray Minimums", "titleSlug": "sum-of-subarray-minimums", "difficulty": "Medium", "tags": ["Array", "Dynamic Programming", "Stack", "Monotonic Stack"], "runtime": 15, "memory": 50.4, "timestamp": 1775546931, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses two monotonic stacks to find the next smaller element (NSE) and previous smaller element (PSE) for each element in the array. This allows the algorithm to efficiently calculate the contribution of each element to the sum of subarray minimums based on its position relative to these boundaries.", "improvements": null, "relatedPatterns": ["Dynamic Programming", "Stack"], "solutionCode": "public class Solution {\n    public int SumSubarrayMins(int[] arr) {\n        int[] nse = findNse(arr);\n        int[] psee = findPsee(arr);\n        long MOD = (long)1e9 + 7;\n        long sum = 0;\n\n        for(int i = 0; i < arr.Length; i++){\n            int left = i - psee[i];\n            int right = nse[i] - i;\n\n            long contribution = ((long)left * right) % MOD;\n            contribution = (contribution * arr[i]) % MOD;\n\n            sum = (sum + contribution) % MOD;\n        }\n\n        return (int)sum;\n    }\n\n    int[] findNse(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n = arr.Length;\n        int[] nse = new int[n];\n\n        for(int i = n - 1; i >= 0; i--){\n            while(st.Count != 0 && arr[st.Peek()] >= arr[i]){\n                st.Pop();\n            }\n            nse[i] = st.Count == 0 ? n : st.Peek();\n            st.Push(i);\n        }\n\n        return nse;\n    }\n\n    int[] findPsee(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n = arr.Length;\n        int[] psee = new int[n];\n\n        for(int i = 0; i < n; i++){\n            while(st.Count != 0 && arr[st.Peek()] > arr[i]){\n                st.Pop();\n            }\n            psee[i] = st.Count == 0 ? -1 : st.Peek();\n            st.Push(i);\n        }\n\n        return psee;\n    }\n}", "solutionExt": "cs"}, {"title": "Trapping Rain Water", "titleSlug": "trapping-rain-water", "difficulty": "Hard", "tags": ["Array", "Two Pointers", "Dynamic Programming", "Stack", "Monotonic Stack"], "runtime": 0, "memory": 46.9, "timestamp": 1775448892, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique to traverse the array from both ends towards the center. It maintains the maximum heights from the left and right sides to calculate the trapped water at each position based on the minimum of these maximum heights.", "improvements": null, "relatedPatterns": ["Dynamic Programming", "Monotonic Stack"], "solutionCode": "public class Solution {\n    public int Trap(int[] heights) {\n        int total = 0, lmax = 0, rmax = 0, l = 0;\n        int r = heights.Length-1;\n\n        while(l<r){\n            if(heights[l]<heights[r]){\n                if(lmax>heights[l]) total+=lmax-heights[l];\n                else lmax = heights[l];\n                l+=1;\n            }\n            else{\n                if(rmax>heights[r]) total+=rmax-heights[r];\n                else rmax = heights[r];\n                r-=1;\n            }\n        }\n\n        return total;\n    }\n}", "solutionExt": "cs"}, {"title": "Next Greater Element II", "titleSlug": "next-greater-element-ii", "difficulty": "Medium", "tags": ["Array", "Stack", "Monotonic Stack"], "runtime": 8, "memory": 61.3, "timestamp": 1775438214, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a monotonic stack to keep track of the next greater elements in a circular array. It iterates through the array twice to ensure all elements are considered, pushing elements onto the stack and popping them when a greater element is found.", "improvements": null, "relatedPatterns": ["Stack", "Circular Array"], "solutionCode": "public class Solution {\n    public int[] NextGreaterElements(int[] nums) {\n        int n = nums.Length;\n        int[] res = new int[n];\n        Array.Fill(res, -1);\n\n        Stack<int> st = new Stack<int>();\n\n        for (int i = 2 * n - 1; i >= 0; i--) {\n            int num = nums[i % n];\n\n            while (st.Count != 0 && st.Peek() <= num) {\n                st.Pop();\n            }\n\n            if (i < n) {\n                res[i] = st.Count == 0 ? -1 : st.Peek();\n            }\n\n            st.Push(num);\n        }\n\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Next Greater Element I", "titleSlug": "next-greater-element-i", "difficulty": "Easy", "tags": ["Array", "Hash Table", "Stack", "Monotonic Stack"], "runtime": 2, "memory": 47.0, "timestamp": 1775436992, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n + m)", "spaceComplexity": "O(n)", "explanation": "The solution uses a monotonic stack to find the next greater element for each element in nums2. It iterates through nums2 in reverse, maintaining a stack of elements to efficiently determine the next greater element for each number.", "improvements": null, "relatedPatterns": ["Hash Table", "Stack"], "solutionCode": "public class Solution {\n    public int[] NextGreaterElement(int[] nums1, int[] nums2) {\n        Dictionary<int, int> neg = new Dictionary<int, int>(); \n        int[] res = new int[nums1.Length];\n        Stack<int> st = new Stack<int>();\n\n        int i = nums2.Length - 1;\n\n        while (i >= 0) {\n            while (st.Count != 0 && st.Peek() <= nums2[i]) {\n                st.Pop();\n            }\n\n            if (st.Count == 0)\n                neg[nums2[i]] = -1;\n            else\n                neg[nums2[i]] = st.Peek();\n\n            st.Push(nums2[i]);\n            i--;\n        }\n\n        for (int j = 0; j < nums1.Length; j++) {\n            res[j] = neg[nums1[j]];\n        }\n\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Reverse Nodes in k-Group", "titleSlug": "reverse-nodes-in-k-group", "difficulty": "Hard", "tags": ["Linked List", "Recursion"], "runtime": 0, "memory": 46.8, "timestamp": 1775276513, "submissionCount": 1, "pattern": "Recursion", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses recursion to reverse nodes in groups of k. It first checks if there are enough nodes to reverse, then reverses the current group and connects it to the result of the next group recursively.", "improvements": "Consider using an iterative approach to reduce the space complexity from O(n) to O(1).", "relatedPatterns": ["Linked List", "Divide and Conquer"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode ReverseKGroup(ListNode head, int k) {\n        if (head == null) return head;\n\n        ListNode temp = head, end = head;\n        int counter = k;\n\n        // Move 'end' to kth node\n        while (counter > 1 && end != null) {\n            end = end.next;\n            counter--;\n        }\n\n        // If less than k nodes\n        if (end == null) return head;\n\n        ListNode nextGroup = end.next;\n        end.next = null;\n\n        // Reverse current k group\n        ListNode newHead = reverse(temp);\n\n        // Connect with next groups\n        temp.next = ReverseKGroup(nextGroup, k);\n\n        return newHead;\n    }\n\n    ListNode reverse(ListNode head) {\n        if (head == null || head.next == null) return head;\n\n        ListNode newHead = reverse(head.next);\n        head.next.next = head;\n        head.next = null;\n\n        return newHead;\n    }\n}", "solutionExt": "cs"}, {"title": "Sort List", "titleSlug": "sort-list", "difficulty": "Medium", "tags": ["Linked List", "Two Pointers", "Divide and Conquer", "Sorting", "Merge Sort"], "runtime": 32, "memory": 75.3, "timestamp": 1775187496, "submissionCount": 1, "pattern": "Merge Sort", "timeComplexity": "O(n log n)", "spaceComplexity": "O(log n)", "explanation": "The solution implements the Merge Sort algorithm to sort a linked list. It recursively divides the list into halves until single nodes are reached, then merges the sorted halves back together.", "improvements": "Consider using an iterative approach to merge sort to reduce the space complexity to O(1) if possible, though it may complicate the implementation.", "relatedPatterns": ["Divide and Conquer", "Linked List"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode SortList(ListNode head) {\n        if(head==null || head.next==null) return head;\n        return MergeSort(head);\n    }\n\n    ListNode MergeSort(ListNode head){\n        if(head==null || head.next==null) return head;\n\n        ListNode middle = FindMiddle(head);\n        ListNode leftHead = head, rightHead = middle.next;\n        middle.next = null;\n        leftHead = MergeSort(leftHead);\n        rightHead = MergeSort(rightHead);\n        return Merge(leftHead, rightHead);\n    }\n\n    ListNode FindMiddle(ListNode head){\n        ListNode slow = head, fast = head.next;\n        while(fast!=null && fast.next!=null){\n            slow = slow.next;\n            fast = fast.next.next;\n        }\n        return slow;\n    }\n\n    ListNode Merge(ListNode lefthead, ListNode righthead){\n        ListNode dummy = new ListNode(-1);\n        ListNode temp1 = lefthead, temp2 = righthead, head = dummy;\n        while(temp1!=null && temp2!=null){\n            if(temp1.val<=temp2.val){\n                head.next = temp1;\n                temp1 = temp1.next;\n            }\n const { stats, problems } = DATA;

document.getElementById('ts').textContent =
  'Updated ' + new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});

// Stats
const STATS = [
  { lbl:'Total Solved', val:stats.total, cls:'' },
  { lbl:'Easy', val:stats.difficulty.Easy, cls:'easy' },
  { lbl:'Medium', val:stats.difficulty.Medium, cls:'medium' },
  { lbl:'Hard', val:stats.difficulty.Hard, cls:'hard' },
  { lbl:'Submissions', val:stats.total_submissions, cls:'accent' },
];
const sg = document.getElementById('stats-grid');
STATS.forEach(s => {
  sg.innerHTML += `<div class="stat"><div class="stat-val ${s.cls}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`;
});

// Diff bars
const dc = document.getElementById('diff-card');
const tot = stats.total || 1;
['Easy','Medium','Hard'].forEach(d => {
  const n = stats.difficulty[d];
  const pct = Math.round(n/tot*100);
  dc.innerHTML += `<div class="diff-item">
    <span class="diff-name ${d}">${d}</span>
    <div class="diff-track"><div class="diff-fill ${d.toLowerCase()}" style="width:0%" data-w="${pct}%"></div></div>
    <span class="diff-n">${n}</span>
  </div>`;
});
requestAnimationFrame(() => {
  document.querySelectorAll('.diff-fill').forEach(el => el.style.width = el.dataset.w);
});

// Tags
let activeTag = null;
const tw = document.getElementById('tags-wrap');
stats.tags.forEach(([tag, count]) => {
  const el = document.createElement('button');
  el.className = 'tag-chip';
  el.dataset.tag = tag;
  el.innerHTML = `${tag} <span class="cnt">${count}</span>`;
  el.onclick = () => {
    activeTag = activeTag === tag ? null : tag;
    document.querySelectorAll('.tag-chip').forEach(c => c.classList.toggle('active', c.dataset.tag === activeTag));
    render();
  };
  tw.appendChild(el);
});

// Patterns
let activePat = null;
const pg = document.getElementById('patterns-grid');
if (stats.patterns.length === 0) {
  pg.innerHTML = '<div style="color:var(--muted);font-size:0.72rem;grid-column:1/-1">No pattern analysis yet — run sync to generate.</div>';
} else {
  stats.patterns.forEach(([pat, count]) => {
    const el = document.createElement('div');
    el.className = 'pat-card';
    el.dataset.pat = pat;
    el.innerHTML = `<div class="pat-name">${pat}</div><div class="pat-cnt">${count} problem${count>1?'s':''}</div>`;
    el.onclick = () => {
      activePat = activePat === pat ? null : pat;
      document.querySelectorAll('.pat-card').forEach(c => c.classList.toggle('active', c.dataset.pat === activePat));
      render();
    };
    pg.appendChild(el);
  });
}

// Calendar
(function() {
  const cal = stats.calendar;
  const WEEKS=26, CELL=14, GAP=3, STEP=CELL+GAP, LP=32, TP=24;
  const W=LP+WEEKS*STEP+4, H=TP+7*STEP+24;
  const svg = document.getElementById('cal-svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  [1,3,5].forEach(d => {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',LP-6); t.setAttribute('y',TP+d*STEP+CELL/2);
    t.setAttribute('text-anchor','end'); t.setAttribute('dominant-baseline','middle');
    t.setAttribute('fill','#4a4a6a'); t.setAttribute('font-size','9');
    t.setAttribute('font-family','JetBrains Mono,monospace');
    t.textContent=days[d]; svg.appendChild(t);
  });
  const start=new Date(); start.setDate(start.getDate()-(WEEKS*7-1));
  const months={};
  for(let w=0;w<WEEKS;w++) {
    for(let d=0;d<7;d++) {
      const date=new Date(start); date.setDate(date.getDate()+w*7+d);
      const ds=date.toISOString().slice(0,10);
      const count=cal[ds]||0;
      let fill='#1e1e2e';
      if(count===1) fill='#312e81';
      else if(count===2) fill='#4338ca';
      else if(count>=3) fill='#7c6af7';
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x',LP+w*STEP); rect.setAttribute('y',TP+d*STEP);
      rect.setAttribute('width',CELL); rect.setAttribute('height',CELL); rect.setAttribute('rx',3);
      rect.setAttribute('fill',fill);
      const title=document.createElementNS('http://www.w3.org/2000/svg','title');
      title.textContent=ds+(count?` — ${count} submission${count>1?'s':''}`:'');
      rect.appendChild(title); svg.appendChild(rect);
      if(d===0) {
        const mo=date.toLocaleString('en',{month:'short'});
        const key=date.getFullYear()+'-'+date.getMonth();
        if(!months[key]) {
          months[key]=true;
          const t=document.createElementNS('http://www.w3.org/2000/svg','text');
          t.setAttribute('x',LP+w*STEP); t.setAttribute('y',TP-8);
          t.setAttribute('fill','#4a4a6a'); t.setAttribute('font-size','9');
          t.setAttribute('font-family','JetBrains Mono,monospace');
          t.textContent=mo; svg.appendChild(t);
        }
      }
    }
  }
})();

// Hints builder
function buildHints(p) {
  const h = [];
  if(p.pattern) h.push(`Think about using the <strong>${p.pattern}</strong> technique.`);
  if(p.timeComplexity) h.push(`Aim for <strong>${p.timeComplexity}</strong> time complexity.`);
  if(p.explanation) h.push(p.explanation.split(' ').slice(0,14).join(' ')+'…');
  if(p.relatedPatterns&&p.relatedPatterns.length) h.push(`Related: ${p.relatedPatterns.join(', ')}.`);
  return h;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Render
let currentFilter='All', searchQ='';

function render() {
  let rows = problems.filter(p => {
    const mf = currentFilter==='All'||p.difficulty===currentFilter;
    const q  = searchQ.toLowerCase();
    const ms = !q||p.title.toLowerCase().includes(q)
      ||p.tags.some(t=>t.toLowerCase().includes(q))
      ||(p.pattern||'').toLowerCase().includes(q);
    const mt = !activeTag||p.tags.includes(activeTag);
    const mp = !activePat||p.pattern===activePat;
    return mf&&ms&&mt&&mp;
  });

  const list = document.getElementById('problem-list');

  if(!rows.length) {
    list.innerHTML='<div class="empty">No problems match your filters.</div>';
    return;
  }

  list.innerHTML = rows.map((p,i) => {
    const id = `p${i}`;
    const hints = buildHints(p);
    const hItems = hints.map((h,j)=>`<li><span class="snum">${j+1}</span><span>${h}</span></li>`).join('');
    const code = esc(p.solutionCode||'// No solution file found');
    const rt = p.runtime===0?'< 1ms':p.runtime+'ms';
    const hasAnalysis = p.pattern||p.timeComplexity||p.explanation;

    return `<div class="pc" id="${id}">
      <div class="ph" onclick="tog('${id}')">
        <div class="pt"><span class="pnum">#${i+1}</span><span>${esc(p.title)}</span></div>
        ${p.pattern?`<span class="ppat">${esc(p.pattern)}</span>`:''}
        <span class="badge ${p.difficulty}">${p.difficulty}</span>
        <span class="prt">${rt}</span>
        <span class="pchev">⌄</span>
      </div>
      <div class="pd">
        <div class="pd-inner">

          <div class="panel">
            <div class="panel-head">
              💡 hint
              <button class="rev-btn" id="${id}-hbtn" onclick="revH('${id}')">Reveal</button>
            </div>
            <div class="panel-body">
              <div class="locked" id="${id}-hl">
                <span class="lock-icon">🔒</span>
                <p>Try solving this first.<br/>Click reveal when ready.</p>
              </div>
              <div class="revealed" id="${id}-hc">
                ${hasAnalysis?`<ul class="hint-steps">${hItems}</ul>
                ${p.improvements&&p.improvements!=='null'?`<div class="improve">💡 ${esc(p.improvements)}</div>`:''}
                <div class="cx-row">
                  <span class="cx"><em>time</em>${esc(p.timeComplexity||'—')}</span>
                  <span class="cx"><em>space</em>${esc(p.spaceComplexity||'—')}</span>
                </div>
                <div class="tag-row">${p.tags.map(t=>`<span class="t-chip">${esc(t)}</span>`).join('')}</div>`
                :'<p style="font-size:0.72rem;color:var(--muted)">No analysis available yet.</p>'}
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              ⌨ solution.${p.solutionExt}
              <button class="rev-btn" id="${id}-sbtn" onclick="revS('${id}')">Reveal</button>
            </div>
            <div class="panel-body">
              <div class="locked" id="${id}-sl">
                <span class="lock-icon">🔒</span>
                <p>Solution hidden.<br/>Attempt first.</p>
              </div>
              <div class="revealed" id="${id}-sc">
                <div class="code-block">${code}</div>
              </div>
            </div>
          </div>

        </div>
        <div class="p-links">
          <a class="lc-link" href="https://leetcode.com/problems/${p.titleSlug}/" target="_blank">Open on LeetCode ↗</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function tog(id) {
  document.getElementById(id).classList.toggle('open');
}

function revH(id) {
  document.getElementById(id+'-hl').style.display='none';
  document.getElementById(id+'-hc').classList.add('shown');
  document.getElementById(id+'-hbtn').style.display='none';
}

function revS(id) {
  document.getElementById(id+'-sl').style.display='none';
  document.getElementById(id+'-sc').classList.add('shown');
  document.getElementById(id+'-sbtn').style.display='none';
}

document.querySelectorAll('.fpill').forEach(b => {
  b.addEventListener('click', () => {
    currentFilter=b.dataset.f;
    document.querySelectorAll('.fpill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    render();
  });
});

document.getElementById('srch').addEventListener('input', e => {
  searchQ=e.target.value; render();
});

render();
</script>
</body>
</html>
