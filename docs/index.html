he next value to determine whether to add or subtract the current value from the result.", "improvements": null, "relatedPatterns": [], "solutionCode": "public class Solution {\n    public int RomanToInt(string s) {\n        int result = 0;\n\n        for (int i = 0; i < s.Length; i++) {\n            int current = RomanHelper(s[i]);\n\n            if (i + 1 < s.Length && current < RomanHelper(s[i + 1])) {\n                result -= current;\n            } else {\n                result += current;\n            }\n        }\n\n        return result;\n    }\n\n    private int RomanHelper(char ch){\n        switch(ch){\n            case 'I': return 1;\n            case 'V': return 5;\n            case 'X': return 10;\n            case 'L': return 50;\n            case 'C': return 100;\n            case 'D': return 500;\n            case 'M': return 1000;\n            default: return 0;\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "String to Integer (atoi)", "titleSlug": "string-to-integer-atoi", "difficulty": "Medium", "tags": ["String"], "runtime": 0, "memory": 41.6, "timestamp": 1774836379, "submissionCount": 1, "pattern": "String Parsing", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the string to skip leading spaces, checks for a sign, and then processes numeric characters to build the integer result. It also handles overflow conditions for both positive and negative results.", "improvements": "Consider using a more robust error handling mechanism for invalid inputs, such as throwing exceptions or returning a specific error code.", "relatedPatterns": ["Greedy", "State Machine"], "solutionCode": "public class Solution {\n    public int MyAtoi(string s) {\n        int i =0, isSigned=1, n=s.Length; long result =0;\n        \n        while(i<n && s[i]==' ') i++;\n\n        if(i<n && (s[i]=='-' || s[i]=='+')){\n            isSigned = s[i]=='-'?-1:1;\n            i++;\n        }\n        while(i<n && s[i]>='0'&& s[i]<='9'){\n            result = result*10 + (s[i]-'0');\n            if(isSigned ==1 && result>int.MaxValue){\n                return int.MaxValue;\n            }\n            else if(isSigned==-1 && -result<int.MinValue){\n                return  int.MinValue;\n            }\n\n            i++;\n        }\n            return (int)(isSigned*result);\n        }\n    \n}", "solutionExt": "cs"}, {"title": "Capacity To Ship Packages Within D Days", "titleSlug": "capacity-to-ship-packages-within-d-days", "difficulty": "Medium", "tags": ["Array", "Binary Search"], "runtime": 17, "memory": 54.0, "timestamp": 1768961738, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(n log m)", "spaceComplexity": "O(1)", "explanation": "The solution uses binary search to find the minimum capacity required to ship all packages within the given number of days. It checks each mid-point capacity by simulating the shipping process and counting the number of days needed.", "improvements": "Consider implementing a more efficient way to calculate the number of days used, potentially reducing the overhead of the linear scan.", "relatedPatterns": ["Greedy", "Prefix Sum"], "solutionCode": "public class Solution {\n    public int ShipWithinDays(int[] weights, int days) {\n        int low = weights.Max(),max=weights.Sum();\n\n\n        while(low<=max){\n            int mid=low+(max-low)/2;\n\n            int usedDays=1;\n            int currLoad=0;\n            foreach(int weight in weights){\n                if(currLoad+weight>mid){\n                    usedDays++;\n                    currLoad=0;\n                }\n                currLoad+=weight;\n            }\n            if(usedDays<=days){\n                max=mid-1;\n            }\n            else{\n                low=mid+1;\n            }\n        }\n        return low;\n    }\n}", "solutionExt": "cs"}, {"title": "Find First and Last Position of Element in Sorted Array", "titleSlug": "find-first-and-last-position-of-element-in-sorted-array", "difficulty": "Medium", "tags": ["Array", "Binary Search"], "runtime": 0, "memory": 50.1, "timestamp": 1768959762, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(log n)", "spaceComplexity": "O(1)", "explanation": "The solution uses binary search to find the first and last occurrences of the target in a sorted array. It performs two separate binary searches: one for the first occurrence and another for the last occurrence, ensuring efficient retrieval of indices.", "improvements": "The code could be optimized by combining the two searches into a single binary search that returns both indices, reducing the number of iterations.", "relatedPatterns": ["Divide and Conquer", "Search Algorithms"], "solutionCode": "public class Solution {\n    public int[] SearchRange(int[] nums, int target) {\n        int low=0,high=nums.Length-1, first=-1,last=-1;\n        first = FirstOccurrence(nums, low,high,target);\n        if(first==-1)return [-1,-1];\n        last = LastOccurrence(nums, low,high,target);\n        return [first,last];\n}\n\n    private int FirstOccurrence(int[] arr, int low, int high, int target){\n        int ans=-1;\n        while(low<=high){\n            int mid = low+(high-low)/2;\n            if(arr[mid]==target){\n                ans = mid;high=mid-1;\n            }\n            else if(arr[mid]<target)\n            {\n                low=mid+1;\n            }\n            else{\n                high=mid-1;\n            }\n        }\n        return ans;\n    }\n    private int LastOccurrence(int[] arr, int low, int high, int target){\n        int ans=-1;\n        while(low<=high){\n            int mid = low+(high-low)/2;\n            if(arr[mid]==target){\n                ans = mid;low=mid+1;\n            }\n            else if(arr[mid]<target)\n            {\n                low=mid+1;\n            }\n            else{\n                high=mid-1;\n            }\n        }\n        return ans;\n    }\n}\n\n", "solutionExt": "cs"}, {"title": "Rearrange Array Elements by Sign", "titleSlug": "rearrange-array-elements-by-sign", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Simulation"], "runtime": 4, "memory": 90.3, "timestamp": 1768828571, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses two pointers to separate positive and negative numbers while maintaining their respective positions in the output array. It iterates through the input array, placing positive numbers at even indices and negative numbers at odd indices.", "improvements": null, "relatedPatterns": ["Array", "Simulation"], "solutionCode": "public class Solution {\n    public int[] RearrangeArray(int[] nums) {\n        int pos=0,neg=1;int[] res = new int[nums.Length];\n        for(int i=0;i<nums.Length;i++){\n            if(nums[i]<0){\n                res[neg]=nums[i];neg+=2;\n            }\n            else{\n                res[pos]=nums[i];pos+=2;\n            }\n        }\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Best Time to Buy and Sell Stock", "titleSlug": "best-time-to-buy-and-sell-stock", "difficulty": "Easy", "tags": ["Array", "Dynamic Programming"], "runtime": 2, "memory": 59.2, "timestamp": 1768819021, "submissionCount": 1, "pattern": "Dynamic Programming", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the prices array while maintaining the index of the minimum price seen so far. It calculates the potential profit at each price and updates the maximum profit accordingly.", "improvements": "Consider adding input validation to handle edge cases such as empty arrays.", "relatedPatterns": ["Greedy", "Sliding Window"], "solutionCode": "public class Solution {\n    public int MaxProfit(int[] prices) {\n        int profit =0, min=0, max=0;\n        for(int i=0;i<prices.Length;i++){\n            min=prices[i]<prices[min]?i:min;\n            profit=Math.Max(profit,prices[i]-prices[min]);\n        }\n        return profit;\n    }\n}", "solutionExt": "cs"}, {"title": "Maximum Subarray", "titleSlug": "maximum-subarray", "difficulty": "Medium", "tags": ["Array", "Divide and Conquer", "Dynamic Programming"], "runtime": 1, "memory": 64.2, "timestamp": 1768800146, "submissionCount": 1, "pattern": "Dynamic Programming", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a dynamic programming approach to find the maximum subarray sum by iterating through the array and maintaining a running sum. It updates the maximum sum encountered so far based on the current sum and the current element.", "improvements": null, "relatedPatterns": ["Kadane's Algorithm"], "solutionCode": "public class Solution {\n    public int MaxSubArray(int[] nums) {\n        int sum=0, maxSum=nums[0];\n        for(int i=0;i<nums.Length;i++){\n            sum=Math.Max(sum+nums[i],nums[i]);\n            maxSum=Math.Max(maxSum,sum);\n        }\n        return maxSum;\n    }\n}", "solutionExt": "cs"}, {"title": "Sort Colors", "titleSlug": "sort-colors", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Sorting"], "runtime": 0, "memory": 46.4, "timestamp": 1768797921, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a three-way partitioning approach with two pointers to sort the array in a single pass. The 'low' pointer tracks the position for 0s, the 'high' pointer tracks the position for 2s, and the 'mid' pointer traverses the array.", "improvements": null, "relatedPatterns": ["Sorting", "Partitioning"], "solutionCode": "public class Solution {\n    public void SortColors(int[] nums) {\n        int low =0, mid=0, high = nums.Length-1;\n        while(mid<=high){\n            if(nums[mid]==0){\n                int tmp = nums[mid];\n                nums[mid]= nums[low];\n                nums[low]=tmp;\n                low++;mid++;\n            }\n            else if(nums[mid]==2){\n                int tmp = nums[mid];\n                nums[mid]= nums[high];\n                nums[high]=tmp;\n                high--;\n            }\n            else{\n                mid++;\n            }\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Check if Array Is Sorted and Rotated", "titleSlug": "check-if-array-is-sorted-and-rotated", "difficulty": "Easy", "tags": ["Array"], "runtime": 0, "memory": 43.4, "timestamp": 1768390202, "submissionCount": 1, "pattern": "Linear Scan", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the array to count the number of times the order of elements is inverted. If there is more than one inversion, the array cannot be sorted and rotated, so it returns false. The check at the end ensures the first and last elements are considered for the rotation.", "improvements": null, "relatedPatterns": ["Array Traversal", "Counting Inversions"], "solutionCode": "public class Solution {\n    public bool Check(int[] nums) {\n        int isInverted=0;\n        for(int i=1;i<nums.Length;i++){\n            if(nums[i]<nums[i-1]){\n                ++isInverted;\n            }\n            if(isInverted>1) return false;\n        }\n        if(nums[0]<nums[nums.Length-1]) ++isInverted;\n        return isInverted<=1;\n    }\n}", "solutionExt": "cs"}, {"title": "Maximum Depth of Binary Tree", "titleSlug": "maximum-depth-of-binary-tree", "difficulty": "Easy", "tags": ["Tree", "Depth-First Search", "Breadth-First Search", "Binary Tree"], "runtime": 0, "memory": 43.3, "timestamp": 1759678458, "submissionCount": 1, "pattern": "Depth-First Search", "timeComplexity": "O(n)", "spaceComplexity": "O(h)", "explanation": "The solution uses a recursive approach to traverse the binary tree. It calculates the maximum depth by taking the maximum depth of the left and right subtrees and adding one for the current node.", "improvements": "The iterative approach using a stack could be implemented to avoid potential stack overflow with deep trees.", "relatedPatterns": ["Recursion", "Tree Traversal"], "solutionCode": "/**\n * Definition for a binary tree node.\n * public class TreeNode {\n *     public int val;\n *     public TreeNode left;\n *     public TreeNode right;\n *     public TreeNode(int val=0, TreeNode left=null, TreeNode right=null) {\n *         this.val = val;\n *         this.left = left;\n *         this.right = right;\n *     }\n * }\n */\npublic class Solution {\n     public int MaxDepth(TreeNode root) {\n        if(root == null) return 0;\n        return 1+ Math.Max(MaxDepth(root.left), MaxDepth(root.right));\n        // return Depth(root, 0);\n    }\n\n    public int Depth(TreeNode root, int level){\n        if(root == null) return level;\n\n        int l = Depth(root.left, level+1);\n        int r = Depth(root.right, level+1);\n        return Math.Max(l,r);\n    }\n}", "solutionExt": "cs"}, {"title": "Invert Binary Tree", "titleSlug": "invert-binary-tree", "difficulty": "Easy", "tags": ["Tree", "Depth-First Search", "Breadth-First Search", "Binary Tree"], "runtime": 0, "memory": 41.6, "timestamp": 1759677681, "submissionCount": 1, "pattern": "Depth-First Search", "timeComplexity": "O(n)", "spaceComplexity": "O(h)", "explanation": "The algorithm recursively swaps the left and right children of each node in the binary tree. It continues this process until it reaches the leaf nodes, effectively inverting the entire tree.", "improvements": null, "relatedPatterns": ["Recursion", "Tree Traversal"], "solutionCode": "/**\n * Definition for a binary tree node.\n * public class TreeNode {\n *     public int val;\n *     public TreeNode left;\n *     public TreeNode right;\n *     public TreeNode(int val=0, TreeNode left=null, TreeNode right=null) {\n *         this.val = val;\n *         this.left = left;\n *         this.right = right;\n *     }\n * }\n */\npublic class Solution {\n    public TreeNode InvertTree(TreeNode root) {\n        if(root == null) return null;\n        TreeNode temp = root.left;\n        root.left = root.right;\n        root.right = temp;\n        InvertTree(root.left);\n        InvertTree(root.right);\n\n        return root;\n    }\n}", "solutionExt": "cs"}, {"title": "Binary Tree Postorder Traversal", "titleSlug": "binary-tree-postorder-traversal", "difficulty": "Easy", "tags": ["Stack", "Tree", "Depth-First Search", "Binary Tree"], "runtime": 0, "memory": 46.7, "timestamp": 1759676759, "submissionCount": 1, "pattern": "Depth-First Search", "timeComplexity": "O(n)", "spaceComplexity": "O(h)", "explanation": "The solution uses a recursive approach to traverse the binary tree in postorder. It visits the left subtree, then the right subtree, and finally adds the root node's value to the list.", "improvements": "Consider using an iterative approach with a stack to avoid potential stack overflow for deep trees.", "relatedPatterns": ["Tree Traversal", "Recursion"], "solutionCode": "/**\n * Definition for a binary tree node.\n * public class TreeNode {\n *     public int val;\n *     public TreeNode left;\n *     public TreeNode right;\n *     public TreeNode(int val=0, TreeNode left=null, TreeNode right=null) {\n *         this.val = val;\n *         this.left = left;\n *         this.right = right;\n *     }\n * }\n */\n// public class Solution {\n//         private IList<int> tree;\n//     public IList<int> PostorderTraversal(TreeNode root) {\n//         tree = new List<int>();\n//         MorrisTraverse(root);\n//         return tree;\n//     }\n\n//     public void MorrisTraverse(TreeNode root){\n//         TreeNode curr = root;\n//         while(curr!=null){\n//             if(curr.right==null){\n//                 tree.Add(curr.val);\n//                 curr = curr.left;\n//             }\n//             else{\n//                 TreeNode prev = curr.right;\n//                 while(prev.left!=null && prev.left!=curr){\n//                     prev = prev.left;\n//                 }\n\n//                 if(prev.left == null){\n//                     tree.Add(curr.val);\n//                     prev.left = curr;\n//                     curr = curr.right;\n//                 }\n//                 else{\n//                     prev.left = null;\n//                     curr = curr.left;\n//                 }\n//             }\n//         }\n\n//         tree = tree.Reverse().ToList();\n//     }\n// }\n\npublic class Solution {\n    public IList<int> PostorderTraversal(TreeNode root) {\n        return travel(root, new List<int>());\n    }\n    public IList<int> travel(TreeNode root, IList<int> list){\n        if(root == null) return list;\n        travel(root.left, list);\n        travel(root.right, list);\n        list.Add(root.val);\n        return list;\n    }\n}", "solutionExt": "cs"}, {"title": "Binary Tree Preorder Traversal", "titleSlug": "binary-tree-preorder-traversal", "difficulty": "Easy", "tags": ["Stack", "Tree", "Depth-First Search", "Binary Tree"], "runtime": 0, "memory": 46.9, "timestamp": 1759649503, "submissionCount": 1, "pattern": "Morris Traversal", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses Morris Traversal to perform a preorder traversal of the binary tree without using additional space for a stack or recursion. It modifies the tree temporarily by creating links to the predecessor nodes to facilitate the traversal.", "improvements": null, "relatedPatterns": ["Depth-First Search", "Tree Traversal"], "solutionCode": "/**\n * Definition for a binary tree node.\n * public class TreeNode {\n *     public int val;\n *     public TreeNode left;\n *     public TreeNode right;\n *     public TreeNode(int val=0, TreeNode left=null, TreeNode right=null) {\n *         this.val = val;\n *         this.left = left;\n *         this.right = right;\n *     }\n * }\n */\npublic class Solution {\n    private IList<int> tree;\n    public IList<int> PreorderTraversal(TreeNode root) {\n        tree = new List<int>();\n        MorrisTraverse(root);\n        return tree;\n    }\n\n    public void MorrisTraverse(TreeNode root){\n        TreeNode curr = root;\n\n        while(curr!=null){\n            if(curr.left == null){\n                tree.Add(curr.val);\n                curr = curr.right;\n            }\n            else{\n                TreeNode prev = curr.left;\n                while(prev.right!=null && prev.right!=curr){\n                    prev = prev.right;\n                }\n\n                if(prev.right==null){\n                    prev.right = curr;\n                    tree.Add(curr.val);\n                    curr = curr.left;\n                }\n                else{\n                    prev.right = null;\n                    curr = curr.right;\n\n                }\n            }\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Binary Tree Inorder Traversal", "titleSlug": "binary-tree-inorder-traversal", "difficulty": "Easy", "tags": ["Stack", "Tree", "Depth-First Search", "Binary Tree"], "runtime": 0, "memory": 46.7, "timestamp": 1759648719, "submissionCount": 1, "pattern": "Morris Traversal", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses Morris Traversal to perform an inorder traversal of the binary tree without using additional space for a stack or recursion. It modifies the tree temporarily by establishing links to the predecessor nodes, allowing traversal without extra space.", "improvements": null, "relatedPatterns": ["Depth-First Search", "Tree Traversal"], "solutionCode": "/**\n * Definition for a binary tree node.\n * public class TreeNode {\n *     public int val;\n *     public TreeNode left;\n *     public TreeNode right;\n *     public TreeNode(int val=0, TreeNode left=null, TreeNode right=null) {\n *         this.val = val;\n *         this.left = left;\n *         this.right = right;\n *     }\n * }\n */\npublic class Solution {\n    private IList<int> tree;\n    public IList<int> InorderTraversal(TreeNode root) {\n        tree = new List<int>();\n        // traverse(root);\n        MorrisTraverse(root);\n        return tree;\n    }\n\n    // public void traverse(TreeNode root){\n    //     if (root ==null){\n    //         return;\n    //     }\n\n    //     traverse(root.left);\n    //     tree.Add(root.val);\n    //     traverse(root.right);\n    // }\n\n    public void MorrisTraverse(TreeNode root){\n        TreeNode curr = root;\n\n        while(curr!=null){\n            if(curr.left == null)\n            {\n                tree.Add(curr.val);\n                curr = curr.right;\n            }\n            else\n            {\n                TreeNode prev = curr.left;\n                while(prev.right!=null && prev.right!=curr){\n                    prev = prev.right;\n                }\n\n                if(prev.right == null){\n                    prev.right = curr;\n                    curr = curr.left;\n                }\n                else{\n                    prev.right = null;\n                    tree.Add(curr.val);\n                    curr = curr.right;\n                }\n            }\n        }\n\n    }\n}", "solutionExt": "cs"}, {"title": "Reverse Linked List II", "titleSlug": "reverse-linked-list-ii", "difficulty": "Medium", "tags": ["Linked List"], "runtime": 0, "memory": 41.3, "timestamp": 1759550949, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The algorithm uses a two-pointer technique to reverse a sublist of a linked list between the given positions. It first navigates to the start of the sublist, then reverses the nodes within the specified range while maintaining the connections to the rest of the list.", "improvements": null, "relatedPatterns": ["Linked List Manipulation", "In-Place Reversal"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode ReverseBetween(ListNode head, int left, int right) {\n        if(left == right) return head;\n        ListNode curr = head;\n        ListNode dummy = new ListNode(0,head);\n        ListNode prevLeft = dummy;\n        while(left>1){\n            curr = curr.next;\n            prevLeft = prevLeft.next;\n            left--;right--;\n        }\n        right = right - left +1;\n        ListNode prev = null;\n\n        while(right>0){\n            ListNode tmp = curr.next;\n            curr.next=prev;\n            prev = curr;\n            curr = tmp;\n            right--; \n        }\n\n        prevLeft.next.next = curr;\n        prevLeft.next = prev;\n\n        return dummy.next;\n    }\n}", "solutionExt": "cs"}, {"title": "Find the Duplicate Number", "titleSlug": "find-the-duplicate-number", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Binary Search", "Bit Manipulation"], "runtime": 3, "memory": 69.5, "timestamp": 1759546872, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses the Floyd's Tortoise and Hare algorithm to detect a cycle in the array, where the duplicate number acts as the entry point of the cycle. It first finds the intersection point of the two pointers and then determines the starting point of the cycle, which is the duplicate number.", "improvements": null, "relatedPatterns": ["Cycle Detection", "Linked List"], "solutionCode": "public class Solution {\n    public int FindDuplicate(int[] nums) {\n        // int slow = nums[0];\n        // int fast = nums[0];\n        // while(true){\n        //     slow = nums[slow];\n        //     fast = nums[nums[fast]];\n        //     if(slow == fast){\n        //         break;\n        //     }\n        // }\n\n        // int slow2=0;\n        // while(true){\n        //     slow2 = nums[slow2];\n        //     slow = nums[slow];\n        //     if(slow == slow2){\n        //         return slow;\n        //     }\n        // }\n\n        int slow = nums[0];\n        int fast = nums[0];\n\n        do {\n            slow = nums[slow];\n            fast = nums[nums[fast]];\n        } while (slow != fast);\n\n        slow = nums[0];\n        while (slow != fast) {\n            slow = nums[slow];\n            fast = nums[fast];\n        }\n\n        return slow;\n    }\n}", "solutionExt": "cs"}, {"title": "Add Two Numbers", "titleSlug": "add-two-numbers", "difficulty": "Medium", "tags": ["Linked List", "Math", "Recursion"], "runtime": 1, "memory": 53.4, "timestamp": 1759544610, "submissionCount": 1, "pattern": "Iterative", "timeComplexity": "O(max(N, M))", "spaceComplexity": "O(1)", "explanation": "The solution iteratively traverses both linked lists, adding corresponding digits along with any carry from the previous addition. It constructs a new linked list to store the result, ensuring to handle cases where the lists are of different lengths or when there's a carry left at the end.", "improvements": null, "relatedPatterns": ["Linked List", "Math"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode AddTwoNumbers(ListNode l1, ListNode l2) {\n        ListNode res = new ListNode(0);\n        ListNode head = res;\n        int rem = 0;\n        while(l1!=null || l2 !=null || rem>0){\n            int x = l1 ==null?0:l1.val;\n            int y = l2 ==null?0:l2.val;\n            int sum = x+y+rem;\n            rem = sum/10;\n            head.next = new ListNode(sum %=10);\n            l1=l1?.next;\n            l2 = l2?.next;\n            head = head.next;\n        }\n\n        return res.next;\n    }\n}", "solutionExt": "cs"}, {"title": "Delete the Middle Node of a Linked List", "titleSlug": "delete-the-middle-node-of-a-linked-list", "difficulty": "Medium", "tags": ["Linked List", "Two Pointers"], "runtime": 2, "memory": 92.1, "timestamp": 1759489299, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses the two-pointer technique to find the middle node of the linked list. The 'slow' pointer moves one step at a time while the 'fast' pointer moves two steps, allowing us to identify the middle node efficiently. Once found, the middle node is removed by adjusting the pointers.", "improvements": null, "relatedPatterns": ["Linked List", "Fast and Slow Pointers"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode DeleteMiddle(ListNode head) {\n        if (head == null || head.next == null) {\n            return null;\n        }\n\n        ListNode slow = head;\n        ListNode fast = head;\n        ListNode prev = null;\n\n        while (fast != null && fast.next != null) {\n            prev = slow;\n            slow = slow.next;\n            fast = fast.next.next;\n        }\n\n        prev.next = slow.next;\n\n        return head;\n    }\n}", "solutionExt": "cs"}, {"title": "Reorder List", "titleSlug": "reorder-list", "difficulty": "Medium", "tags": ["Linked List", "Two Pointers", "Stack", "Recursion"], "runtime": 0, "memory": 49.9, "timestamp": 1759488140, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses the two-pointer technique to find the middle of the linked list, then reverses the second half of the list. Finally, it merges the two halves in the required order.", "improvements": null, "relatedPatterns": ["Linked List", "Stack"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public void ReorderList(ListNode head) {\n        ListNode slow = head;\n        ListNode fast = head.next;\n\n        while(fast!=null && fast.next!=null){\n            slow = slow.next;\n            fast = fast.next.next;\n        }\n\n        ListNode second = slow.next;\n        ListNode prev = slow.next = null;\n\n        while(second!=null){\n            ListNode temp = second.next;\n            second.next = prev;\n            prev = second;\n            second = temp;\n        }\n\n        ListNode first = head;\n        second = prev;\n        while(second!=null){\n            ListNode tmp1 = first.next;\n            ListNode tmp2 = second.next;\n            first.next = second;\n            second.next = tmp1;\n            first = tmp1;\n            second = tmp2;\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Merge Two Sorted Lists", "titleSlug": "merge-two-sorted-lists", "difficulty": "Easy", "tags": ["Linked List", "Recursion"], "runtime": 0, "memory": 43.1, "timestamp": 1759483072, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n + m)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers to traverse both linked lists simultaneously. It compares the values at each pointer and appends the smaller value to the result list, effectively merging the two sorted lists in a single pass.", "improvements": null, "relatedPatterns": ["Linked List", "Merge Sort"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode MergeTwoLists(ListNode list1, ListNode list2) {\n        ListNode res = new ListNode(0);\n        ListNode node = res;\n        while(list1!=null && list2!=null){\n            if(list1.val<list2.val){\n                node.next = list1;\n                list1 = list1.next;\n            }\n            else{\n                node.next = list2;\n                list2 = list2.next;\n            }\n            node = node.next;\n        }\n        if(list1!=null){\n            node.next = list1;\n        }\n        else {\n            node.next = list2;\n        }\n\n        return res.next;\n    }\n    \n}", "solutionExt": "cs"}, {"title": "Koko Eating Bananas", "titleSlug": "koko-eating-bananas", "difficulty": "Medium", "tags": ["Array", "Binary Search"], "runtime": 11, "memory": 49.5, "timestamp": 1759389900, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(n log m)", "spaceComplexity": "O(1)", "explanation": "The solution uses binary search to find the minimum eating speed that allows Koko to finish all the bananas within the given hours. It calculates the total time required for each potential speed and adjusts the search range based on whether the time exceeds the limit.", "improvements": "Consider using a more efficient way to calculate total time without using Math.Ceiling, if possible, to reduce overhead.", "relatedPatterns": ["Greedy", "Sorting"], "solutionCode": "public class Solution {\n    public int MinEatingSpeed(int[] piles, int h) {\n        int l=1, r = piles.Max(), res = r;\n\n        while(l<=r){\n            int m = l+(r-l)/2; double totalTime = 0;\n            foreach(var pile in piles){\n                totalTime+= Math.Ceiling((double)pile/m);\n            }\n\n            if(totalTime<=h){\n                res = m;\n                r=m-1;\n            }\n            else{\n                l=m+1;\n            }\n        }\n\n        return res;\n    }\n}\n", "solutionExt": "cs"}, {"title": "Search a 2D Matrix", "titleSlug": "search-a-2d-matrix", "difficulty": "Medium", "tags": ["Array", "Binary Search", "Matrix"], "runtime": 0, "memory": 44.7, "timestamp": 1759388479, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(log(m) + log(n))", "spaceComplexity": "O(1)", "explanation": "The solution first uses binary search to find the correct row in the 2D matrix where the target could exist. Once the row is identified, it performs another binary search within that row to locate the target.", "improvements": null, "relatedPatterns": ["Matrix Search", "Divide and Conquer"], "solutionCode": "public class Solution {\n    public bool SearchMatrix(int[][] matrix, int target) {\n        int ROWS = matrix.Length;\n        int COLS = matrix[0].Length;\n        if (matrix.Length == 0 || matrix[0].Length == 0) return false;\n        int top =0, bot =ROWS-1;\n        int row=0;\n\n        while(top<=bot){\n            row = top + (bot-top)/2;\n\n            if(target>matrix[row][COLS-1]){\n                top = row+1;\n            }\n            else if (target<matrix[row][0]){\n                bot = row-1;\n            }\n            else {\n                break;\n            }\n        }\n\n        if(top>bot){\n            return false;\n        }\n\n        int l=0, r = COLS-1;\n        while(l<=r){\n            int m = l + (r-l)/2;\n            if(target>matrix[row][m]){\n                l=m+1;\n            }\n            else if(target<matrix[row][m]){\n                r=m-1;\n            }\n            else {\n                return true;\n            }\n        }\n\n        return false;\n\n    }\n}\n", "solutionExt": "cs"}, {"title": "Largest Rectangle in Histogram", "titleSlug": "largest-rectangle-in-histogram", "difficulty": "Hard", "tags": ["Array", "Stack", "Monotonic Stack"], "runtime": 6, "memory": 57.5, "timestamp": 1759384791, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The algorithm uses a monotonic stack to keep track of the indices of the histogram bars. As it iterates through the heights, it calculates the area of rectangles formed by the bars when a shorter bar is encountered, ensuring that the maximum area is updated accordingly.", "improvements": null, "relatedPatterns": ["Stack", "Dynamic Programming"], "solutionCode": "public class Solution {\n    public int LargestRectangleArea(int[] heights) {\n        Stack<int> stack = new Stack<int>();\n\n        int n = heights.Length;\n        int maxArea = 0;\n        for(int i=0;i<=n;i++){\n            while(stack.Count>0 && (i==n || heights[stack.Peek()]>=heights[i])){\n                int height = heights[stack.Pop()];\n                int width = stack.Count == 0? i:i-stack.Peek()-1;\n                maxArea = Math.Max(maxArea, height*width);\n            }\n            stack.Push(i);\n        }\n        return maxArea;\n    }\n}\n", "solutionExt": "cs"}, {"title": "Car Fleet", "titleSlug": "car-fleet", "difficulty": "Medium", "tags": ["Array", "Stack", "Sorting", "Monotonic Stack"], "runtime": 82, "memory": 78.2, "timestamp": 1758867308, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n log n)", "spaceComplexity": "O(n)", "explanation": "The solution sorts the cars based on their positions in descending order and calculates the time taken for each car to reach the target. By comparing the time taken for each car, it determines the number of fleets formed, where a fleet is formed when a car takes longer than the previous one.", "improvements": null, "relatedPatterns": ["Sorting", "Greedy"], "solutionCode": "public class Solution {\n    public int CarFleet(int target, int[] position, int[] speed) {\n        int n = position.Length;\n        int[][] pair = new int[n][];\n        \n        for (int i = 0; i < n; i++) {\n            pair[i] = new int[] { position[i], speed[i] };\n        }\n\n        Array.Sort(pair, (a, b) => b[0].CompareTo(a[0]));\n\n        // Stack<double> timeTaken = new Stack<double>();\n        int fleet=0;\n        double lastTime = 0.0;\n\n        foreach (var car in pair) {\n            double time = (double)(target - car[0]) / car[1];\n            if (time > lastTime) {\n                // timeTaken.Push(time);\n                lastTime = time; ++fleet;\n            }\n        }\n\n        return fleet;\n    }\n}", "solutionExt": "cs"}, {"title": "Simplify Path", "titleSlug": "simplify-path", "difficulty": "Medium", "tags": ["String", "Stack"], "runtime": 5, "memory": 44.4, "timestamp": 1758107373, "submissionCount": 1, "pattern": "Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a stack to manage the components of the path. It iterates through each character in the input string, handling directory changes based on the current segment, and constructs the simplified path by reversing the stack at the end.", "improvements": null, "relatedPatterns": ["String Manipulation"], "solutionCode": "public class Solution {\n    public string SimplifyPath(string path) {\n        Stack<string> stack = new Stack<string>();\n        string cur = \"\";\n        foreach (char ch in path+\"/\"){\n            if(ch=='/'){\n                if(cur==\"..\"){\n                    if(stack.Count>0) stack.Pop();\n\n                }\n                else if(cur!=\"\" && cur!=\".\"){\n                    stack.Push(cur);\n                }\n                cur =\"\";\n            }\n            else{\n                cur+=ch;\n            }\n        }\n\n        var result = new List<string>(stack);\n        result.Reverse();\n        return \"/\" + string.Join(\"/\", result);\n    }\n}", "solutionExt": "cs"}, {"title": "Daily Temperatures", "titleSlug": "daily-temperatures", "difficulty": "Medium", "tags": ["Array", "Stack", "Monotonic Stack"], "runtime": 10, "memory": 72.7, "timestamp": 1757992482, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a monotonic stack to keep track of indices of temperatures in a way that allows us to efficiently find the next warmer temperature for each day. As we iterate through the temperatures, we pop from the stack whenever we find a temperature that is warmer than the temperature at the index stored at the top of the stack, calculating the difference in indices to determine the number of days until a warmer temperature.", "improvements": null, "relatedPatterns": ["Stack", "Array"], "solutionCode": "public class Solution {\n    public int[] DailyTemperatures(int[] temperatures) {\n        // int [] res = new int[temperatures.Length];\n        // Array.Fill(res,0);\n        // Stack<int[]> stack = new Stack<int[]>();\n        // for(int i=0;i<temperatures.Length;i++){\n        //     int temp = temperatures[i];\n        //     while(stack.Count>0 && temp>stack.Peek()[0]){\n        //         int[] pair = stack.Pop();\n        //         res[pair[1]] = i-pair[1];\n        //     }\n        //     stack.Push(new int[]{temp,i});\n        // }\n        // return res;\n\n        int[] results = new int[temperatures.Length];\n        Stack<int> stack = new Stack<int>();\n        /// UPVOTE !\n        for (int i = 0; i < temperatures.Length; i++) {\n            while (stack.Count > 0 && temperatures[stack.Peek()] < temperatures[i]) {\n                int index = stack.Pop();\n                results[index] = i - index;\n            }\n            stack.Push(i);\n        }\n\n        return results;\n    }\n}", "solutionExt": "cs"}, {"title": "Evaluate Reverse Polish Notation", "titleSlug": "evaluate-reverse-polish-notation", "difficulty": "Medium", "tags": ["Array", "Math", "Stack"], "runtime": 12, "memory": 44.5, "timestamp": 1757777064, "submissionCount": 1, "pattern": "Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a stack to evaluate the Reverse Polish Notation by iterating through the tokens. When an operator is encountered, the top two elements are popped from the stack, the operation is performed, and the result is pushed back onto the stack.", "improvements": null, "relatedPatterns": ["Array", "Math"], "solutionCode": "public class Solution {\n    public int EvalRPN(string[] tokens) {\n       Stack<int> stack = new Stack<int>();\n\n        foreach(var item in tokens){\n            if(item == \"+\"){\n                var a = stack.Pop();\n                var b = stack.Pop();\n                stack.Push(b+a);\n            }\n            else if(item == \"-\"){\n                var a = stack.Pop();\n                var b = stack.Pop();\n                stack.Push(b-a);\n            }\n            else if(item == \"*\"){\n                var a = stack.Pop();\n                var b = stack.Pop();\n                stack.Push(b*a);\n            }\n            else if(item == \"/\"){\n                var a = stack.Pop();\n                var b = stack.Pop();\n                stack.Push(b/a);\n            }\n            else{\n                stack.Push(int.Parse(item));\n            }\n        }\n        return stack.Peek(); \n    }\n}", "solutionExt": "cs"}, {"title": "Min Stack", "titleSlug": "min-stack", "difficulty": "Medium", "tags": ["Stack", "Design"], "runtime": 2, "memory": 54.8, "timestamp": 1757776559, "submissionCount": 1, "pattern": "Stack", "timeComplexity": "O(1)", "spaceComplexity": "O(n)", "explanation": "The MinStack uses two stacks to keep track of the main stack's elements and the minimum values. Every time a value is pushed, it is compared with the current minimum, ensuring that the minimum stack always has the smallest value at the top.", "improvements": null, "relatedPatterns": ["Design", "Data Structure"], "solutionCode": "public class MinStack {\nStack<int> stack;\n    Stack<int>minVal;\n    public MinStack() {\n        stack = new Stack<int>();\n        minVal = new Stack<int>();\n    }\n    \n    public void Push(int val) {\n        stack.Push(val);\n        val = Math.Min(val, minVal.Count==0? val: minVal.Peek());\n        minVal.Push(val);\n    }\n    \n    public void Pop() {\n        stack.Pop();\n        minVal.Pop();\n    }\n    \n    public int Top() {\n        return stack.Peek();\n    }\n    \n    public int GetMin() {\n        return minVal.Peek();\n    }\n}\n\n/**\n * Your MinStack object will be instantiated and called as such:\n * MinStack obj = new MinStack();\n * obj.Push(val);\n * obj.Pop();\n * int param_3 = obj.Top();\n * int param_4 = obj.GetMin();\n */", "solutionExt": "cs"}, {"title": "Valid Parentheses", "titleSlug": "valid-parentheses", "difficulty": "Easy", "tags": ["String", "Stack"], "runtime": 5, "memory": 42.3, "timestamp": 1757775581, "submissionCount": 1, "pattern": "Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a stack to keep track of opening parentheses. For each character in the string, it checks if it's a closing parenthesis and matches it with the top of the stack, ensuring that all parentheses are properly closed and nested.", "improvements": null, "relatedPatterns": ["Greedy", "Backtracking"], "solutionCode": "public class Solution {\n    public bool IsValid(string s) {\n        Dictionary<char, char> data = new Dictionary<char, char>{\n            {')', '('},\n            {']', '['},\n            {'}', '{'}\n        };\n\n        Stack<char> stack = new Stack<char>();\n\n        foreach(char ch in s){\n            if(data.ContainsKey(ch)){\n                if(stack.Count>0 && stack.Peek()==data[ch]){\n                    stack.Pop();\n                }\n                else{\n                    return false;\n                }\n            }\n            else{\n                stack.Push(ch);\n            }\n        }\n\n        return stack.Count == 0;\n    }\n}", "solutionExt": "cs"}, {"title": "Baseball Game", "titleSlug": "baseball-game", "difficulty": "Easy", "tags": ["Array", "Stack", "Simulation"], "runtime": 4, "memory": 42.2, "timestamp": 1757765883, "submissionCount": 1, "pattern": "Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a stack to keep track of the scores from the baseball game operations. It processes each operation in constant time, updating the stack accordingly and calculating the total score at the end.", "improvements": null, "relatedPatterns": ["Array", "Simulation"], "solutionCode": "public class Solution {\n    public int CalPoints(string[] operations) {\n        Stack<int> rec = new Stack<int>();\n        foreach(var op in operations){\n            if(op == \"+\"){\n                var top = rec.Pop();\n                int newTop = top+rec.Peek();\n                rec.Push(top);\n                rec.Push(newTop);\n            }\n            else if(op == \"C\"){\n                rec.Pop();\n            }\n            else if(op == \"D\"){\n                rec.Push(2*rec.Peek());\n            }\n            else{\n                rec.Push(int.Parse(op));\n            }\n        }\n        int total = 0;\n        foreach( var val in rec){\n            total +=val;\n        }\n        return total;\n    }\n}", "solutionExt": "cs"}, {"title": "Boats to Save People", "titleSlug": "boats-to-save-people", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Greedy", "Sorting"], "runtime": 66, "memory": 51.4, "timestamp": 1757693096, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n log n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique after sorting the array of people. The left pointer starts from the beginning and the right pointer from the end, attempting to pair the lightest and heaviest individuals together to minimize the number of boats needed.", "improvements": "Consider using a priority queue to handle cases with more complex weight distributions, although the current approach is efficient for the problem constraints.", "relatedPatterns": ["Greedy", "Sorting"], "solutionCode": "public class Solution {\n    public int NumRescueBoats(int[] people, int limit) {\n        Array.Sort(people);\n        int l = 0, r = people.Length - 1, res = 0;\n\n        while (l <= r) {\n            if (people[l] + people[r] <= limit) {\n                l++; \n            }\n            r--;   \n            res++; \n        }\n\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Container With Most Water", "titleSlug": "container-with-most-water", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Greedy"], "runtime": 1, "memory": 63.2, "timestamp": 1757672095, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer approach, starting with one pointer at each end of the array. It calculates the area formed by the lines at these pointers and moves the pointer pointing to the shorter line inward to potentially find a larger area.", "improvements": null, "relatedPatterns": ["Greedy", "Array"], "solutionCode": "public class Solution {\n    public int MaxArea(int[] height) {\n        int l=0, r=height.Length-1;\n        int res = 0;\n        while(l<r){\n            int area = Math.Min(height[l], height[r]) *(r-l);\n            res = Math.Max(res, area);\n            if(height[l]<=height[r]) l++;\n            else r--;\n        }\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "4Sum", "titleSlug": "4sum", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Sorting"], "runtime": 42, "memory": 48.4, "timestamp": 1757664347, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n^3)", "spaceComplexity": "O(n)", "explanation": "The solution uses a recursive KSum function to find quadruplets that sum to the target. It sorts the input array and employs two pointers to efficiently find pairs that complement the current selection of numbers.", "improvements": "Consider using a HashSet to store results to avoid duplicates more efficiently.", "relatedPatterns": ["Backtracking", "Sorting"], "solutionCode": "public class Solution {\n    IList<IList<int>> res;\n    List<int> quad;\n\n    public IList<IList<int>> FourSum(int[] nums, int target) {\n        Array.Sort(nums);\n        res = new List<IList<int>>();\n        quad = new List<int>();\n        KSum(nums, 4, 0, (long)target);\n        return res;\n    }\n\n    public void KSum(int[] nums, int k, int start, long target) {\n        if (k == 2) {\n            int l = start, r = nums.Length - 1;\n            while (l < r) {\n                long sum = (long)nums[l] + nums[r];\n                if (sum > target) r--;\n                else if (sum < target) l++;\n                else {\n                    var newQuad = new List<int>(quad);\n                    newQuad.Add(nums[l]);\n                    newQuad.Add(nums[r]);\n                    res.Add(newQuad);\n                    l++; r--;\n                    while (l < r && nums[l] == nums[l - 1]) l++;\n                    while (l < r && nums[r] == nums[r + 1]) r--;\n                }\n            }\n            return;\n        }\n\n        for (int i = start; i < nums.Length - k + 1; i++) {\n            if (i > start && nums[i] == nums[i - 1]) continue; // skip duplicates\n            quad.Add(nums[i]);\n            KSum(nums, k - 1, i + 1, target - nums[i]);\n            quad.RemoveAt(quad.Count - 1);\n        }\n    }\n}\n", "solutionExt": "cs"}, {"title": "3Sum", "titleSlug": "3sum", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Sorting"], "runtime": 31, "memory": 66.3, "timestamp": 1757653253, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n^2)", "spaceComplexity": "O(1)", "explanation": "The solution first sorts the array, then uses a loop to fix one element and applies the two-pointer technique to find pairs that sum to the negative of the fixed element. This efficiently finds all unique triplets that sum to zero.", "improvements": "Consider using a hash set to store results to avoid duplicates more efficiently, though the current approach already handles duplicates well.", "relatedPatterns": ["Sorting", "Hashing"], "solutionCode": "public class Solution {\n    public IList<IList<int>> ThreeSum(int[] nums) {\n        Array.Sort(nums);\n        IList<IList<int>> res = new List<IList<int>>();\n\n        for (int i = 0; i < nums.Length - 2; i++) {\n            if (nums[i] > 0) break; \n            if (i > 0 && nums[i] == nums[i - 1]) continue;\n\n            int l = i + 1, r = nums.Length - 1;\n\n            while (l < r) {\n                int threeSum = nums[i] + nums[l] + nums[r];\n\n                if (threeSum > 0) r--;\n                else if (threeSum < 0) l++;\n                else {\n                    res.Add(new List<int> { nums[i], nums[l], nums[r] });\n                    l++; r--;\n\n                    while (l < r && nums[l] == nums[l - 1]) l++;\n                    while (l < r && nums[r] == nums[r + 1]) r--;\n                }\n            }\n        }\n        return res;\n    }\n}\n", "solutionExt": "cs"}, {"title": "Two Sum II - Input Array Is Sorted", "titleSlug": "two-sum-ii-input-array-is-sorted", "difficulty": "Medium", "tags": ["Array", "Two Pointers", "Binary Search"], "runtime": 0, "memory": 50.9, "timestamp": 1757554956, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer approach where one pointer starts at the beginning of the array and the other at the end. By adjusting the pointers based on the sum of the values at these indices compared to the target, the algorithm efficiently finds the two indices that sum to the target.", "improvements": null, "relatedPatterns": ["Binary Search", "Sorting"], "solutionCode": "public class Solution {\n    public int[] TwoSum(int[] numbers, int target) {\n        int l=0, r=numbers.Length-1;\n        while(l<r){\n            int sum = numbers[l]+numbers[r];\n            if(sum>target) r--;\n            else if(sum<target) l++;\n            else return new int[]{l+1,r+1};\n        }\n        return new int[0];\n    }\n}", "solutionExt": "cs"}, {"title": "Merge Sorted Array", "titleSlug": "merge-sorted-array", "difficulty": "Easy", "tags": ["Array", "Two Pointers", "Sorting"], "runtime": 0, "memory": 46.7, "timestamp": 1757554095, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(m + n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers to traverse the two input arrays from the end towards the beginning. It compares the elements from both arrays and places the larger element at the end of the first array, effectively merging them in sorted order.", "improvements": null, "relatedPatterns": ["Merge Sort", "Sorting"], "solutionCode": "public class Solution {\n    public void Merge(int[] nums1, int m, int[] nums2, int n) {\n        int last = m+n-1, i=m-1, j=n-1;\n        while(j>=0){\n            if(i>=0 && nums1[i]>nums2[j]){\n                nums1[last--] = nums1[i--];\n            }\n            else{\n                nums1[last--] = nums2[j--];\n            }\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Merge Strings Alternately", "titleSlug": "merge-strings-alternately", "difficulty": "Easy", "tags": ["Two Pointers", "String"], "runtime": 52, "memory": 41.7, "timestamp": 1757551350, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses two pointers to iterate through both strings simultaneously, appending characters from each string to the output in an alternating fashion. Once one string is fully traversed, the remaining characters from the other string are appended to the output.", "improvements": "Using a StringBuilder instead of string concatenation could improve performance due to reduced overhead from creating multiple string instances.", "relatedPatterns": ["String Manipulation"], "solutionCode": "public class Solution {\n    public string MergeAlternately(string word1, string word2) {\n    int l1 = 0, l2 = 0;\n    string output = \"\";\n    \n    while (l1 < word1.Length && l2 < word2.Length) {\n        output += word1[l1];\n        output += word2[l2];\n        l1++; \n        l2++;\n    }\n    \n    return output + word1.Substring(l1) + word2.Substring(l2);\n}\n\n}", "solutionExt": "cs"}, {"title": "Design HashSet", "titleSlug": "design-hashset", "difficulty": "Easy", "tags": ["Array", "Hash Table", "Linked List", "Design", "Hash Function"], "runtime": 12, "memory": 72.9, "timestamp": 1756299127, "submissionCount": 1, "pattern": "Hash Table", "timeComplexity": "O(1) on average for Add, Remove, and Contains", "spaceComplexity": "O(n)", "explanation": "The solution uses a hash table implemented with an array of linked lists to handle collisions. Each key is hashed to an index in the array, and linked lists are used to store multiple keys that hash to the same index.", "improvements": "Consider using a dynamic array or resizing the hash table to reduce the load factor and improve performance in cases of high collision.", "relatedPatterns": ["Linked List", "Chaining"], "solutionCode": "public class ListNode {\n    public int Key;\n    public ListNode Next;\n\n    public ListNode(int key) {\n        Key = key;\n        Next = null;\n    }\n}\n\npublic class MyHashSet {\n    private ListNode[] set;\n\n    public MyHashSet() {\n        set = new ListNode[10000];\n        for (int i = 0; i < set.Length; i++) {\n            set[i] = new ListNode(0); // Dummy head\n        }\n    }\n\n    public void Add(int key) {\n        ListNode cur = set[key % set.Length];\n        while (cur.Next != null) {\n            if (cur.Next.Key == key) return;\n            cur = cur.Next;\n        }\n        cur.Next = new ListNode(key);\n    }\n\n    public void Remove(int key) {\n        ListNode cur = set[key % set.Length];\n        while (cur.Next != null) {\n            if (cur.Next.Key == key) {\n                cur.Next = cur.Next.Next;\n                return;\n            }\n            cur = cur.Next;\n        }\n    }\n\n    public bool Contains(int key) {\n        ListNode cur = set[key % set.Length];\n        while (cur.Next != null) {\n            if (cur.Next.Key == key) return true;\n            cur = cur.Next;\n        }\n        return false;\n    }\n}", "solutionExt": "cs"}, {"title": "Contains Duplicate", "titleSlug": "contains-duplicate", "difficulty": "Easy", "tags": ["Array", "Hash Table", "Sorting"], "runtime": 14, "memory": 70.6, "timestamp": 1756289147, "submissionCount": 1, "pattern": "Hash Table", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a hash table to track the occurrences of each number in the input array. As it iterates through the array, it checks if the number already exists in the hash table, returning true if a duplicate is found, otherwise adding the number to the table.", "improvements": null, "relatedPatterns": ["Set", "Sorting"], "solutionCode": "public class Solution {\n    public bool ContainsDuplicate(int[] nums) {\n        Dictionary<int, int> map = new Dictionary<int, int>();\n        int n = nums.Length;\n        for(int i=0;i<n;i++){\n            if(map.ContainsKey(nums[i])){\n                return true;\n            }\n            map.Add(nums[i],i);\n        }\n        return false;\n    }\n}", "solutionExt": "cs"}, {"title": "Concatenation of Array", "titleSlug": "concatenation-of-array", "difficulty": "Easy", "tags": ["Array", "Simulation"], "runtime": 0, "memory": 52.1, "timestamp": 1756087393, "submissionCount": 1, "pattern": "Array Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution creates a new array of double the size of the input array and fills it by copying each element from the input array twice. This is done in a single loop that iterates through the input array.", "improvements": null, "relatedPatterns": ["Copying Arrays", "Simulation"], "solutionCode": "public class Solution {\n    public int[] GetConcatenation(int[] nums) {\n        int n = nums.Length;\n        int[] ans = new int[2*n];\n        // while(i<n){\n        //     ans[i] = nums[i];\n        //     ans[i+n] = nums[i];\n        //     i++;\n        // }\n        for(int i=0;i<n;i++){\n                ans[i] = nums[i];\n            ans[i+n] = nums[i];\n        }\n        return ans;\n    }\n}", "solutionExt": "cs"}, {"title": "Minimum Bit Flips to Convert Number", "titleSlug": "minimum-bit-flips-to-convert-number", "difficulty": "Easy", "tags": ["Bit Manipulation"], "runtime": 0, "memory": 29.3, "timestamp": 1755659817, "submissionCount": 1, "pattern": "Bit Manipulation", "timeComplexity": "O(b)", "spaceComplexity": "O(1)", "explanation": "The solution uses the XOR operation to identify the bits that differ between the two numbers. It then counts the number of set bits in the result, which corresponds to the minimum number of bit flips required to convert the start number to the goal number.", "improvements": null, "relatedPatterns": ["Hamming Distance", "Bitwise Operations"], "solutionCode": "public class Solution {\n    public int MinBitFlips(int start, int goal) {\n        int flipReq = start^goal, cnt=0;\n        while(flipReq!=0){\n            flipReq=flipReq&(flipReq-1);\n            ++cnt;\n        }\n        return cnt;\n    }\n}", "solutionExt": "cs"}, {"title": "Reverse Words in a String", "titleSlug": "reverse-words-in-a-string", "difficulty": "Medium", "tags": ["Two Pointers", "String"], "runtime": 1, "memory": 41.8, "timestamp": 1754915219, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution splits the input string into words using whitespace as a delimiter, reverses the array of words, and then joins them back into a single string. This approach efficiently handles leading, trailing, and multiple spaces by using StringSplitOptions.RemoveEmptyEntries.", "improvements": "Consider using a single pass with a StringBuilder to avoid the overhead of creating an array and reversing it, which can improve performance for large strings.", "relatedPatterns": ["String Manipulation", "Array Manipulation"], "solutionCode": "public class Solution {\n    public string ReverseWords(string s) {\n        string[] words = s.Split(new char[] { ' ' }, StringSplitOptions.RemoveEmptyEntries);\n         Array.Reverse(words);\n         return string.Join(\" \", words);\n    //     s = s.Trim(); StringBuilder st = new StringBuilder(); int r=0;\n    //     for(int i=s.Length-1;i>=0;i--){\n    //         if(s[i]==' ' && r!=0){\n    //             string word = s.Substring(i+1, r);\n    //             st.Append(word+\" \"); r=0;\n    //         }\n    // else if(s[i]!=' '){\n    //  r++;\n    // }\n    //     }\n    //     st.Append(s.Substring(0, r));\n    // return st.ToString();\n\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Outermost Parentheses", "titleSlug": "remove-outermost-parentheses", "difficulty": "Easy", "tags": ["String", "Stack"], "runtime": 1, "memory": 41.4, "timestamp": 1754913933, "submissionCount": 1, "pattern": "Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a balance counter to track the depth of parentheses while iterating through the string. It appends characters to the result only when the balance is greater than zero, effectively removing the outermost parentheses.", "improvements": null, "relatedPatterns": ["String Manipulation", "Greedy"], "solutionCode": "public class Solution {\n    public string RemoveOuterParentheses(string s) {\n        StringBuilder ans = new StringBuilder();\n        int balance = 0;\n        foreach(char character in s){\n            if(character == '('){\n                if(balance > 0){\n                    ans.Append(character);\n                }\n                balance++;\n            }\n            else{\n                balance--;\n                if(balance > 0){\n                    ans.Append(character);\n                }\n            }\n        }\n        return ans.ToString();\n    }\n}", "solutionExt": "cs"}, {"title": "Single Element in a Sorted Array", "titleSlug": "single-element-in-a-sorted-array", "difficulty": "Medium", "tags": ["Array", "Binary Search"], "runtime": 0, "memory": 49.9, "timestamp": 1754802717, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(log n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a binary search approach to efficiently find the single non-duplicate element in a sorted array. By checking the parity of the mid index and comparing the mid element with its neighbors, the search space is halved in each iteration until the single element is found.", "improvements": null, "relatedPatterns": ["Divide and Conquer"], "solutionCode": "public class Solution {\n    public int SingleNonDuplicate(int[] nums) {\n        int n = nums.Length, high = n-1, low = 0;\n        while(low<high){\n            int mid = (low+high)/2;\n            if(mid%2==0){\n                if(nums[mid]==nums[mid+1]){\n                    low = mid+2;\n                }\n                else{\n                    high = mid;\n                }\n            }\n            else{\n                if(nums[mid]==nums[mid-1]){\n                    low = mid+1;\n                }\n                else{\n                    high = mid-1;\n                }\n            }\n        }\n        return nums[low];\n    }\n}", "solutionExt": "cs"}, {"title": "Find Minimum in Rotated Sorted Array", "titleSlug": "find-minimum-in-rotated-sorted-array", "difficulty": "Medium", "tags": ["Array", "Binary Search"], "runtime": 0, "memory": 42.5, "timestamp": 1754749446, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(log n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a modified binary search to find the minimum element in a rotated sorted array. It compares the middle element with the low and high pointers to determine which half of the array to search next.", "improvements": null, "relatedPatterns": ["Divide and Conquer"], "solutionCode": "public class Solution {\n    public int FindMin(int[] nums) {\n        int n = nums.Length, high = n - 1, low = 0, ans = int.MaxValue;\n        while(low<=high){\n            int mid = (low+high)/2;\n            if(nums[low]<=nums[mid]){\n                ans = Math.Min(ans, nums[low]);\n                low = mid+1;\n            }\n            else{\n                ans = Math.Min(ans, nums[mid]);\n                high = mid-1;\n            }\n    }\n    return ans;\n}\n}", "solutionExt": "cs"}, {"title": "Search in Rotated Sorted Array II", "titleSlug": "search-in-rotated-sorted-array-ii", "difficulty": "Medium", "tags": ["Array", "Binary Search"], "runtime": 0, "memory": 45.6, "timestamp": 1754747223, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a modified binary search to find the target in a rotated sorted array. It handles duplicates by incrementing or decrementing the low and high pointers when necessary, ensuring that all elements are considered.", "improvements": "Consider using a more efficient approach if duplicates are rare, as the current solution can degrade to O(n) in the worst case.", "relatedPatterns": ["Search in Rotated Sorted Array", "Binary Search on Sorted Array"], "solutionCode": "public class Solution {\n    public bool Search(int[] nums, int target) {\n        int n = nums.Length, high = n-1, low = 0;\n        while(low <=high){\n            int mid = (low+high)/2;\n            if(nums[mid] == target)return true;\n            else if(nums[low] == nums[mid] && nums[low]==nums[high]){\n                ++low; --high ;\n            }\n            else if(nums[low]<= nums[mid]){\n                if(nums[low]<=target && target <= nums[mid]){\n                    high = mid-1;\n                }\n                else{\n                    low = mid+1;\n                }\n            }\n            else{\n                if(nums[mid]<=target && target <= nums[high]){\n                                    low = mid+1;\n                                }\n                                else{\n                                    high = mid-1;\n                                }\n            }\n        }\n        return false;\n    }\n}", "solutionExt": "cs"}, {"title": "Search in Rotated Sorted Array", "titleSlug": "search-in-rotated-sorted-array", "difficulty": "Medium", "tags": ["Array", "Binary Search"], "runtime": 0, "memory": 42.7, "timestamp": 1754746105, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(log n)", "spaceComplexity": "O(1)", "explanation": "The solution utilizes a modified binary search to find the target in a rotated sorted array. It checks which part of the array is sorted and narrows down the search space accordingly based on the target's value.", "improvements": null, "relatedPatterns": ["Divide and Conquer"], "solutionCode": "public class Solution {\n    public int Search(int[] nums, int target) {\n        int n = nums.Length, high = n-1, low = 0;\n        while(low<=high){\n            int mid = (low+high)/2;\n            if(nums[mid]==target) return mid;\n            else if(nums[low]<=nums[mid]){\n                if(nums[low]<=target && target <= nums[mid]){\n                    high = mid -1;\n                }\n                else{\n                    low = mid+1;\n                }\n            }\n            else{\n                if(nums[mid]<=target && target <= nums[high]){\n                    low = mid+1;\n                }\n                else{\n                    high = mid-1;\n                }\n            }\n        }\n        return -1;\n    }\n}", "solutionExt": "cs"}, {"title": "Binary Search", "titleSlug": "binary-search", "difficulty": "Easy", "tags": ["Array", "Binary Search"], "runtime": 0, "memory": 52.8, "timestamp": 1754734311, "submissionCount": 1, "pattern": "Binary Search", "timeComplexity": "O(log n)", "spaceComplexity": "O(1)", "explanation": "The solution implements a binary search algorithm to find the target value in a sorted array. It repeatedly divides the search interval in half, adjusting the low and high pointers based on the comparison of the middle element with the target.", "improvements": null, "relatedPatterns": ["Divide and Conquer"], "solutionCode": "public class Solution {\n    public int Search(int[] nums, int target) {\n        int low = 0,n = nums.Length,  high = n-1;\n\n        while(low<=high){\n            int mid = (low+high)/2;\n            if(nums[mid]>target){\n                high=mid-1;\n            }\n            else if(nums[mid]<target){\n                low=mid+1;\n            }\n            else{\n                return mid;\n            }\n        }\n        return -1;\n    }\n}", "solutionExt": "cs"}, {"title": "Longest Consecutive Sequence", "titleSlug": "longest-consecutive-sequence", "difficulty": "Medium", "tags": ["Array", "Hash Table", "Union-Find"], "runtime": 42, "memory": 74.0, "timestamp": 1754659871, "submissionCount": 1, "pattern": "Hash Set", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a HashSet to store the unique elements of the array, allowing for O(1) average time complexity for lookups. It iterates through each number, checking for the start of a consecutive sequence and counting its length.", "improvements": "Consider using a Union-Find data structure for potentially better handling of larger datasets with many duplicates.", "relatedPatterns": ["Union-Find", "Sliding Window"], "solutionCode": "public class Solution {\n    public int LongestConsecutive(int[] nums) {\n        HashSet<int> data = new HashSet<int>(nums);\n        int n= nums.Length, longest = 1, cnt =1;\n        if(n==0){\n            return 0;\n        }\n        // for(int i=0;i<n;i++){\n        //     data.Add(nums[i]);\n        // }\n        foreach(int num in data){\n            if(!data.Contains(num-1)){\n                cnt =1;\n                while(data.Contains(num+cnt)){\n                    ++cnt; \n                }\n                longest = Math.Max(cnt, longest);\n            }\n        }\n        return longest;\n    }\n}", "solutionExt": "cs"}, {"title": "Count Good Numbers", "titleSlug": "count-good-numbers", "difficulty": "Medium", "tags": ["Math", "Recursion"], "runtime": 0, "memory": 28.8, "timestamp": 1750829795, "submissionCount": 1, "pattern": "Exponentiation by Squaring", "timeComplexity": "O(log n)", "spaceComplexity": "O(1)", "explanation": "The solution calculates the number of good numbers by determining the number of choices for even and odd positions separately. It uses modular exponentiation to efficiently compute the powers of 5 and 4, which represent the choices for even and odd indexed positions respectively.", "improvements": null, "relatedPatterns": ["Modular Arithmetic", "Dynamic Programming"], "solutionCode": "public class Solution {\n     private const long MOD = 1_000_000_007;\n\n    public int CountGoodNumbers(long n) {\n        long evenPositions = (n + 1) / 2;\n        long oddPositions = n / 2;\n\n        long countEvenChoices = Power(5, evenPositions);\n        long countOddChoices = Power(4, oddPositions);\n\n        long result = (countEvenChoices * countOddChoices) % MOD;\n\n        return (in
