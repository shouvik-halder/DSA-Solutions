<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>dsa.solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --border2: rgba(255,255,255,0.12);
  --accent: #7c6af7;
  --accent-glow: rgba(124,106,247,0.12);
  --accent2: #f97316;
  --easy: #22c55e;
  --medium: #f59e0b;
  --hard: #ef4444;
  --text: #e2e8f0;
  --muted: #4a4a6a;
  --card: #13131f;
  --font: 'Syne', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
header {
  padding: 56px 0 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}

.logo {
  font-family: var(--font);
  font-weight: 800;
  font-size: 2.4rem;
  letter-spacing: -0.03em;
  line-height: 1;
}

.logo span { color: var(--accent); }

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.gh-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: all 0.2s;
  font-family: var(--mono);
}

.gh-link:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-glow);
}

.updated {
  font-size: 0.72rem;
  color: var(--muted);
}

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 48px;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  transition: border-color 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
}

.stat:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.stat::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}

.stat:hover::after { opacity: 1; }

.stat-val {
  font-family: var(--font);
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 8px;
}

.stat-val.easy { color: var(--easy); }
.stat-val.medium { color: var(--medium); }
.stat-val.hard { color: var(--hard); }
.stat-val.accent { color: var(--accent); }

.stat-lbl {
  font-size: 0.68rem;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
}

/* ── Section heading ── */
.sec-head {
  font-family: var(--font);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.sec-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Two col ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 48px;
}

@media (max-width: 640px) {
  .two-col { grid-template-columns: 1fr; }
  .logo { font-size: 1.8rem; }
  .stat-val { font-size: 1.8rem; }
}

/* ── Card shell ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
}

/* ── Diff bars ── */
.diff-item {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.diff-item:last-child { margin-bottom: 0; }

.diff-name {
  font-size: 0.72rem;
  font-weight: 500;
  width: 56px;
  letter-spacing: 0.04em;
}

.diff-name.easy { color: var(--easy); }
.diff-name.medium { color: var(--medium); }
.diff-name.hard { color: var(--hard); }

.diff-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.diff-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}

.diff-fill.easy { background: var(--easy); }
.diff-fill.medium { background: var(--medium); }
.diff-fill.hard { background: var(--hard); }

.diff-n {
  font-size: 0.78rem;
  font-weight: 500;
  width: 22px;
  text-align: right;
  color: var(--muted);
}

/* ── Tags ── */
.tags-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag-chip {
  font-size: 0.72rem;
  font-weight: 400;
  padding: 5px 11px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
}

.tag-chip:hover, .tag-chip.active {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-glow);
}

.tag-chip .cnt {
  font-size: 0.65rem;
  color: var(--accent);
  font-weight: 500;
}

/* ── Patterns ── */
.patterns-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
  margin-bottom: 48px;
}

.pat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.pat-card:hover, .pat-card.active {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.pat-name {
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
}

.pat-cnt {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ── Calendar ── */
.cal-wrap {
  overflow-x: auto;
  padding-bottom: 4px;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.search {
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 9px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  outline: none;
  width: 260px;
  transition: border-color 0.2s;
}

.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }

.fpill {
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}

.fpill:hover, .fpill.on {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-glow);
}

/* ── Problem cards ── */
#problem-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.pc {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.pc:hover { border-color: var(--border2); }
.pc.open { border-color: var(--accent); }

.ph {
  display: grid;
  grid-template-columns: 1fr auto auto auto auto;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}

.pt {
  font-family: var(--font);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.pt span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.pnum {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  flex-shrink: 0;
}

.badge {
  font-size: 0.65rem;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 5px;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  font-family: var(--mono);
}

.badge.Easy { background: rgba(34,197,94,0.1); color: var(--easy); }
.badge.Medium { background: rgba(245,158,11,0.1); color: var(--medium); }
.badge.Hard { background: rgba(239,68,68,0.1); color: var(--hard); }

.ppat {
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 3px 9px;
  border-radius: 5px;
  flex-shrink: 0;
  white-space: nowrap;
  font-family: var(--mono);
}

.prt {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  flex-shrink: 0;
}

.pchev {
  color: var(--muted);
  transition: transform 0.25s;
  flex-shrink: 0;
  font-size: 1rem;
}

.pc.open .pchev { transform: rotate(180deg); }

/* ── Detail panel ── */
.pd {
  display: none;
  border-top: 1px solid var(--border);
}

.pc.open .pd { display: block; }

.pd-inner {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 700px) {
  .pd-inner { grid-template-columns: 1fr; }
  .ph { grid-template-columns: 1fr auto auto; }
  .ppat, .prt { display: none; }
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.panel-head {
  padding: 10px 14px;
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--mono);
}

.panel-body { padding: 14px; }

.rev-btn {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 4px 10px;
  border: 1px solid var(--accent);
  border-radius: 6px;
  background: var(--accent-glow);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}

.rev-btn:hover {
  background: var(--accent);
  color: #fff;
}

.locked {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px 12px;
  text-align: center;
}

.locked p {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.6;
}

.lock-icon {
  font-size: 1.4rem;
  color: var(--muted);
}

.revealed { display: none; }
.revealed.shown { display: block; }

.hint-steps {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.hint-steps li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.72rem;
  color: var(--text);
  line-height: 1.7;
}

.snum {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 0.6rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  font-family: var(--mono);
}

.cx-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.cx {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 3px 8px;
  border-radius: 5px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.cx em {
  color: var(--muted);
  font-size: 0.6rem;
  font-style: normal;
  opacity: 0.6;
}

.improve {
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(249,115,22,0.06);
  border: 1px solid rgba(249,115,22,0.2);
  border-radius: 8px;
  font-size: 0.68rem;
  color: var(--text);
  line-height: 1.6;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 12px;
}

.t-chip {
  font-size: 0.62rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--card);
  color: var(--muted);
  border: 1px solid var(--border);
  font-family: var(--mono);
}

.code-block {
  background: var(--bg);
  border-radius: 7px;
  overflow: auto;
  max-height: 300px;
  font-family: var(--mono);
  font-size: 0.68rem;
  line-height: 1.65;
  color: var(--text);
  padding: 14px;
  white-space: pre;
  border: 1px solid var(--border);
}

.p-links {
  display: flex;
  gap: 10px;
  padding: 0 20px 16px;
}

.lc-link {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--accent);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border: 1px solid var(--accent);
  border-radius: 8px;
  background: var(--accent-glow);
  transition: all 0.15s;
  font-family: var(--mono);
}

.lc-link:hover {
  background: var(--accent);
  color: #fff;
}

.empty {
  text-align: center;
  padding: 60px;
  color: var(--muted);
  font-size: 0.8rem;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

fies the duplicate by checking if an index has already been marked, and then finds the missing number by checking which index remains positive.", "improvements": null, "relatedPatterns": ["Hash Table", "Sorting"], "solutionCode": "public class Solution {\n    public int[] FindErrorNums(int[] nums) {\n        // Dictionary<int, int> count = new Dictionary<int, int> ();\n        // for(int i = 0;i<nums.Length;i++){\n        //     if(count.ContainsKey(nums[i])) count[nums[i]]++;\n        //     else count[nums[i]]=1;\n        // }\n        // int dup = 0, miss = 0;\n        // for(int i =1;i<=nums.Length;i++){\n        //     int check = count.ContainsKey(i)?count[i]:0;\n        //     if(check==2) dup= i;\n        //     else if (check == 0 )miss = i;\n        // }\n        // if(miss == 0)miss = nums.Length;\n\n        // return new int[]{dup, miss};\n        \n        // optimal\n        //  intuition: We will be visiting the nums[pos] where pos is the value of nums[i]-1\n\n        int dup = 0; int miss = 0;\n        for(int i=0;i<nums.Length;i++){\n            int targetIdx = Math.Abs(nums[i])-1;\n            if(nums[targetIdx]<0){\n                dup = Math.Abs(nums[i]);\n            }\n            else{\n                nums[targetIdx]= -nums[targetIdx];\n                }\n        }\n\n        for(int i =0;i<nums.Length;i++){\n            if(nums[i]>0) miss = i + 1;\n        }\n\n        return new int[]{dup, miss};\n    }\n}", "solutionExt": "cs"}, {"title": "Single Number II", "titleSlug": "single-number-ii", "difficulty": "Medium", "tags": ["Array", "Bit Manipulation"], "runtime": 0, "memory": 44.2, "timestamp": 1780137576, "submissionCount": 1, "pattern": "Bit Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two variables, 'ones' and 'twos', to keep track of the bits that have appeared once and twice respectively. By using bitwise operations, it efficiently determines the unique number that appears only once in the array while all other numbers appear three times.", "improvements": null, "relatedPatterns": ["XOR", "Counting Bits"], "solutionCode": "public class Solution {\n    public int SingleNumber(int[] nums) {\n        // brute\n        // Dictionary<int, int> count = new Dictionary<int,int>();\n        // for(int i =0;i<nums.Length;i++){\n        //     if(!count.ContainsKey(nums[i]))count[nums[i]]=1;\n        //     else count[nums[i]]++;\n        // }\n\n        // foreach(var check in count ){\n        //     if(check.Value ==1) return check.Key;\n        // }\n\n        // return -1;\n\n        // optimal we count the number of set bits in each bit position\n        // if the bits are divisible by 3 then the contibution of that bit position is not contributed by the single value\n        // int res = 0;\n        // for(int i = 0;i<32;i++){\n\n        //     int bitSum = 0;\n\n        //     foreach(int num in nums){\n        //         bitSum+=(num>>i) & 1;\n        //     }\n\n        //     if(bitSum%3==1){\n        //         res|=(1<<i);\n        //     }\n        // }\n\n        // return res;\n\n\n        // best\n        // Check the count of bit set all at once;\n\n        int ones = 0;int twos = 0;\n        foreach(int num in nums){\n            ones = (ones^num) &~twos;\n            twos = (twos^num) & ~ones;\n        }\n\n        return ones;\n\n    }\n}", "solutionExt": "cs"}, {"title": "Missing Number", "titleSlug": "missing-number", "difficulty": "Easy", "tags": ["Array", "Hash Table", "Math", "Binary Search", "Bit Manipulation", "Sorting"], "runtime": 0, "memory": 47.1, "timestamp": 1780119286, "submissionCount": 2, "pattern": "Mathematical Summation", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution calculates the expected sum of the first n natural numbers and subtracts the sum of the elements in the array to find the missing number. This approach is efficient as it only requires a single pass through the array and uses constant space.", "improvements": null, "relatedPatterns": ["Array", "Hash Table"], "solutionCode": "public class Solution {\n    public int MissingNumber(int[] nums) {\n        int n = nums.Length;\n        int sum = n*(n+1)/2;\n        for(int i = 0; i<n;i++){\n            sum-=nums[i];\n        }\n        return sum;\n    }\n}", "solutionExt": "cs"}, {"title": "Single Number", "titleSlug": "single-number", "difficulty": "Easy", "tags": ["Array", "Bit Manipulation"], "runtime": 0, "memory": 46.4, "timestamp": 1780116990, "submissionCount": 2, "pattern": "Bit Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses the XOR operation to find the single number in the array. By XORing all the numbers together, pairs of identical numbers cancel each other out, leaving only the unique number.", "improvements": null, "relatedPatterns": ["Hash Table", "Linear Search"], "solutionCode": "public class Solution {\n    public int SingleNumber(int[] nums) {\n        int res = 0;\n        if(nums.Length ==1) return nums[0];\n        for (int i=0; i<nums.Length;i++){\n            res^=nums[i];\n        }\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Minimum Operations to Sort a Permutation", "titleSlug": "minimum-operations-to-sort-a-permutation", "difficulty": "Medium", "tags": [], "runtime": 5, "memory": 70.2, "timestamp": 1780038898, "submissionCount": 1, "pattern": "Array Traversal", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the array to count the number of elements in ascending and descending order based on their expected positions in a sorted permutation. It then evaluates specific conditions to determine the minimum operations required to sort the permutation.", "improvements": "Consider handling edge cases more explicitly to improve readability and maintainability.", "relatedPatterns": ["Greedy", "Sorting"], "solutionCode": "public class Solution {\n    public int MinOperations(int[] nums) {\n        int isInverted = 0;\n        int asc =1, desc =1;int n = nums.Length;\n        for(int i = 1;i<n;i++){\n            if(nums[i]==((nums[i-1]+1)%n)) asc++;\n            else if(nums[i-1]==(nums[i]+1)%n) desc++;\n        }\n        int x = nums[0];\n        if(asc == n && x==0) return 0;\n        else if(asc == n) return Math.Min(n-x, x+2);\n        else if( desc == n) return 1+Math.Min(n-nums[n-1], nums[n-1]);\n        else return -1;\n    }\n}", "solutionExt": "cs"}, {"title": "Password Strength", "titleSlug": "password-strength", "difficulty": "Medium", "tags": [], "runtime": 15, "memory": 50.7, "timestamp": 1779991953, "submissionCount": 1, "pattern": "Hash Set", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a HashSet to store unique characters from the password, ensuring that each character is only counted once for scoring. It then calculates the total strength points based on the character types using a helper function.", "improvements": "Consider using a single pass to calculate points while checking for unique characters to reduce the number of iterations.", "relatedPatterns": ["Set Operations", "Character Counting"], "solutionCode": "public class Solution {\n    public int PasswordStrength(string password) {\n\n        HashSet<char> charr = new HashSet<char>();\n\n        foreach (char ch in password) {\n            charr.Add(ch);\n        }\n\n        int sum = 0;\n\n        foreach (char ch in charr) {\n            sum += Points(ch);\n        }\n\n        return sum;\n    }\n\n    public int Points(char ch) {\n\n    if (char.IsUpper(ch))\n        return 2;\n\n    if (char.IsLower(ch))\n        return 1;\n\n    if (char.IsDigit(ch))\n        return 3;\n\n    if (\"!@#$\".Contains(ch))\n        return 5;\n\n    return 0;\n}\n}", "solutionExt": "cs"}, {"title": "Limit Occurrences in Sorted Array", "titleSlug": "limit-occurrences-in-sorted-array", "difficulty": "Easy", "tags": [], "runtime": 1, "memory": 51.9, "timestamp": 1779991431, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a single pass through the sorted array to count occurrences of each number. It maintains a result list that only includes numbers that appear up to 'k' times.", "improvements": "Consider using a fixed-size array for the result if the maximum size is known, to reduce space complexity.", "relatedPatterns": ["Sliding Window", "Frequency Count"], "solutionCode": "public class Solution {\n    public int[] LimitOccurrences(int[] nums, int k) {\n        if (nums.Length == 0 || k == 0)\n            return new int[0];\n\n        List<int> res = new List<int>();\n\n        int count = 1;\n        res.Add(nums[0]);\n\n        for (int i = 1; i < nums.Length; i++) {\n\n            if (nums[i] == nums[i - 1]) {\n                count++;\n            } else {\n                count = 1;\n            }\n\n            if (count <= k) {\n                res.Add(nums[i]);\n            }\n        }\n\n        return res.ToArray();\n    }\n}", "solutionExt": "cs"}, {"title": "Zigzag Conversion", "titleSlug": "zigzag-conversion", "difficulty": "Medium", "tags": ["String"], "runtime": 24, "memory": 57.0, "timestamp": 1779962166, "submissionCount": 1, "pattern": "String Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution constructs a zigzag pattern by iterating through the input string and placing characters into an array of strings corresponding to each row. It uses a direction variable to switch between moving down and up the rows as it fills the characters.", "improvements": "Consider using a StringBuilder instead of string concatenation for better performance when constructing the final result.", "relatedPatterns": ["Dynamic Programming", "Array Manipulation"], "solutionCode": "public class Solution {\n    public string Convert(string s, int numRows) {\n        if(s.Length==numRows || numRows ==1 || s.Length <=1) return s;\n\n        string[] arr = new string[numRows];\n\n        int direction = 1;int row = 0;\n        foreach(char ch in s){\n            arr[row] = arr[row]+ch;\n            if(row == 0) {direction =1; row++;}\n            else if(row == numRows-1) {direction = -1; row --;}\n            else row+=direction;\n        }\n        string res = string.Empty;\n        foreach(string rowdata in arr){\n            res+=rowdata;\n        }\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Longest Common Prefix", "titleSlug": "longest-common-prefix", "difficulty": "Easy", "tags": ["Array", "String", "Trie"], "runtime": 5, "memory": 43.2, "timestamp": 1779955725, "submissionCount": 2, "pattern": "Sorting", "timeComplexity": "O(n log n)", "spaceComplexity": "O(1)", "explanation": "The solution sorts the array of strings and then compares the first and last strings to find the longest common prefix. This works because the common prefix will be the same for the lexicographically smallest and largest strings in the sorted order.", "improvements": "Using a horizontal scanning approach could reduce the time complexity to O(n * m), where n is the number of strings and m is the length of the shortest string, making it more efficient for large datasets.", "relatedPatterns": ["Horizontal Scanning", "Divide and Conquer"], "solutionCode": "public class Solution {\n    public string LongestCommonPrefix(string[] strs) {\n        if (strs==null || strs.Length ==0) return \"\";\n        int strsLen =  strs.Length;\n        int strLen = strs[0].Length;\n\n        for(int i = 0; i< strLen;i++){\n            char curr = strs[0][i];\n            for(int j = 0; j<strsLen;j++){\n                if(i>=strs[j].Length || strs[j][i]!=curr) return strs[0].Substring(0, i);\n            }\n        }\n        return strs[0];\n    }\n}", "solutionExt": "cs"}, {"title": "Is Subsequence", "titleSlug": "is-subsequence", "difficulty": "Easy", "tags": ["Two Pointers", "String", "Dynamic Programming"], "runtime": 0, "memory": 42.0, "timestamp": 1779954576, "submissionCount": 2, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers to traverse both strings, incrementing the pointer for the subsequence string 's' only when a matching character is found in string 't'. If the pointer for 's' reaches its length, it confirms that 's' is a subsequence of 't'.", "improvements": null, "relatedPatterns": ["String Matching", "Dynamic Programming"], "solutionCode": "public class Solution {\n    public bool IsSubsequence(string s, string t) {\n        int lenS = s.Length;\n        int lenT = t.Length;\n        int indS = 0, indT = 0;\n        while(indT<lenT && indS<lenS){\n            if(s[indS]==t[indT]){\n                indS++;\n            }\n            indT++;\n        }\n        return indS == lenS;\n}\n}", "solutionExt": "cs"}, {"title": "Rotate String", "titleSlug": "rotate-string", "difficulty": "Easy", "tags": ["String", "String Matching"], "runtime": 0, "memory": 41.5, "timestamp": 1779953143, "submissionCount": 1, "pattern": "String Manipulation", "timeComplexity": "O(n^2)", "spaceComplexity": "O(n)", "explanation": "The solution checks all possible rotations of the string by concatenating substrings. It iterates through each possible rotation and compares it to the goal string.", "improvements": "Using string concatenation to form a new string and checking if the goal is a substring can reduce the time complexity to O(n).", "relatedPatterns": ["Sliding Window", "Substring Search"], "solutionCode": "public class Solution {\n    public bool RotateString(string s, string goal) {\n        int n = s.Length;\n        if(s==goal) return true;\n        for(int i=1;i<n;i++){\n            if(s.Substring(i,n-i)+ s.Substring(0, i) == goal) return true;\n        }\n        return false;\n    }\n}", "solutionExt": "cs"}, {"title": "Valid Anagram", "titleSlug": "valid-anagram", "difficulty": "Easy", "tags": ["Hash Table", "String", "Sorting"], "runtime": 1, "memory": 43.5, "timestamp": 1779883970, "submissionCount": 1, "pattern": "Hash Table", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a fixed-size array to count the occurrences of each character in the first string and then decrements the counts based on the second string. If any count goes negative, it indicates that the second string has more of that character than the first, thus returning false.", "improvements": null, "relatedPatterns": ["Counting Sort", "Character Frequency"], "solutionCode": "public class Solution {\n    public bool IsAnagram(string s, string t) {\n        if (s.Length != t.Length) return false;\n\n        int[] count = new int[26];\n\n        foreach (char ch in s) {\n            count[ch - 'a']++;\n        }\n\n        foreach (char ch in t) {\n            count[ch - 'a']--;\n            if (count[ch - 'a'] < 0) return false;\n        }\n\n        return true;\n    }\n}", "solutionExt": "cs"}, {"title": "Longest Palindrome", "titleSlug": "longest-palindrome", "difficulty": "Easy", "tags": ["Hash Table", "String", "Greedy"], "runtime": 5, "memory": 40.6, "timestamp": 1779880469, "submissionCount": 1, "pattern": "Hash Table", "timeComplexity": "O(n)", "spaceComplexity": "O(k)", "explanation": "The solution uses a HashSet to track characters that appear an odd number of times. It iterates through the string, adding or removing characters from the set, and counts the length of the longest palindrome that can be formed based on the characters' frequencies.", "improvements": null, "relatedPatterns": ["Greedy", "String"], "solutionCode": "public class Solution {\n    public int LongestPalindrome(string s) {\n        HashSet<char> oddChars = new HashSet<char>();\n        int len = 0;\n        foreach(char ch in s){\n            if(oddChars.Contains(ch)){\n                oddChars.Remove(ch);\n                len+=2;\n            }\n            else oddChars.Add(ch);\n        }\n\n        if(oddChars.Count>0) len++;\n\n        return len;\n    }\n}", "solutionExt": "cs"}, {"title": "Valid Palindrome II", "titleSlug": "valid-palindrome-ii", "difficulty": "Easy", "tags": ["Two Pointers", "String", "Greedy"], "runtime": 4, "memory": 52.6, "timestamp": 1779879240, "submissionCount": 2, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique to check if the string can be a palindrome by allowing at most one character removal. If a mismatch is found, it checks both possibilities of skipping either the left or right character using a helper function to verify if the remaining substring is a palindrome.", "improvements": null, "relatedPatterns": ["String Manipulation", "Greedy"], "solutionCode": "public class Solution {\n    public bool ValidPalindrome(string s) {\n        int l = 0; int r = s.Length-1;\n\n        while(l<r){\n            if(s[l]!=s[r]){\n                return IsPalindrome(s, l, r-1)|| IsPalindrome(s, l+1, r);\n            }\n            l++;r--;\n        }\n        return true;\n    }\n\n    public bool IsPalindrome(string s, int l, int r ){\n        while(l<r){\n            if(s[l]!=s[r]) return false;\n            l++;r--;\n        }\n        return true;\n    }\n\n}", "solutionExt": "cs"}, {"title": "Valid Palindrome", "titleSlug": "valid-palindrome", "difficulty": "Easy", "tags": ["Two Pointers", "String"], "runtime": 18, "memory": 44.5, "timestamp": 1779865422, "submissionCount": 2, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers to traverse the string from both ends towards the center, skipping non-alphanumeric characters. It compares the characters at both pointers after converting them to lowercase, ensuring that the string is a palindrome.", "improvements": null, "relatedPatterns": ["String Manipulation"], "solutionCode": "public class Solution\n{\n    public bool IsPalindrome(string s)\n    {\n        int l = 0, r = s.Length - 1;\n\n        while (l < r)\n        {\n            if (!IsAlphaNum(s[l]))\n            {\n                l++;\n            }\n            else if (!IsAlphaNum(s[r]))\n            {\n                r--;\n            }\n            else if (char.ToLower(s[l]) != char.ToLower(s[r]))\n            {\n                return false;\n            }\n            else\n            {\n                l++;\n                r--;\n            }\n        }\n\n        return true;\n    }\n\n    public bool IsAlphaNum(char ch)\n    {\n        return (ch >= 'A' && ch <= 'Z') ||\n               (ch >= 'a' && ch <= 'z') ||\n               (ch >= '0' && ch <= '9');\n    }\n}", "solutionExt": "cs"}, {"title": "Find the Index of the First Occurrence in a String", "titleSlug": "find-the-index-of-the-first-occurrence-in-a-string", "difficulty": "Easy", "tags": ["Two Pointers", "String", "String Matching"], "runtime": 1, "memory": 40.1, "timestamp": 1779860906, "submissionCount": 1, "pattern": "KMP (Knuth-Morris-Pratt)", "timeComplexity": "O(n + m)", "spaceComplexity": "O(m)", "explanation": "The solution uses the KMP algorithm to find the first occurrence of the needle in the haystack efficiently. It preprocesses the needle to create an LPS (Longest Prefix Suffix) array, which helps in skipping unnecessary comparisons during the search.", "improvements": null, "relatedPatterns": ["Two Pointers", "String Matching"], "solutionCode": "public class Solution {\n    public int StrStr(string haystack, string needle) {\n        // brute\n        // int n = haystack.Length;\n        // int m = needle.Length;\n        // for(int i = 0; i<=n-m;i++){\n        //     int j= 0 ;\n        //     while(j<m && haystack[i+j]==needle[j]){\n        //         j++;\n        //     }\n        //     if(j==m){\n        //         return i;\n        //     }\n        // }\n        // return -1;\n\n        // optimised\n        // knutt-matt-pratt algo\n\n        int n = haystack.Length;\n        int m = needle.Length;\n        var lps = BuildLPS(needle, m);\n        int i = 0;\n        int j = 0;\n\n        while(i<n){\n            if(haystack[i]==needle[j]){\n                i++;j++;\n            }\n\n            if(j==m){\n                return i-j;\n            }\n            else if(i < n && haystack[i]!=needle[j]){\n                if(j>0){\n                    j = lps[j-1];\n\n                }\n                else{\n                    i++;\n                }\n            }\n        }\n        return -1;\n\n    }\n\n    public int[] BuildLPS(string pat, int m){\n        int[] lps = new int[m];\n        lps[0]=0;\n        int j = 1, len=0;\n        while(j<m){\n            if(pat[j]==pat[len]){\n                len++;\n                lps[j]=len;\n                j++;\n            }\n            else {\n                if(len>0){\n                    len = lps[len-1];\n                }\n                else{\n                    lps[j]=0;\n                    j++;\n                }\n            }\n        }\n\n        return lps;\n    }\n}", "solutionExt": "cs"}, {"title": "Length of Last Word", "titleSlug": "length-of-last-word", "difficulty": "Easy", "tags": ["String"], "runtime": 0, "memory": 40.9, "timestamp": 1779816343, "submissionCount": 2, "pattern": "String Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution trims the input string to remove leading and trailing spaces, then splits it into an array of words based on spaces. It retrieves the last word from the array and returns its length.", "improvements": "Instead of splitting the string into an array, iterate from the end of the string to find the last word, which can reduce space complexity to O(1).", "relatedPatterns": ["Two Pointers", "String Traversal"], "solutionCode": "public class Solution {\n    public int LengthOfLastWord(string s) {\n        var sarr = s.Trim().Split(' ');\n        return sarr[sarr.Length-1].Length;\n    }\n}", "solutionExt": "cs"}, {"title": "Reverse String", "titleSlug": "reverse-string", "difficulty": "Easy", "tags": ["Two Pointers", "String"], "runtime": 1, "memory": 64.4, "timestamp": 1779816205, "submissionCount": 2, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers, one starting at the beginning and the other at the end of the character array. It swaps the characters at these pointers and moves them towards the center until they meet, effectively reversing the string in place.", "improvements": null, "relatedPatterns": ["In-place Algorithm", "Swapping"], "solutionCode": "public class Solution {\n    public void ReverseString(char[] s) {\n        int n = s.Length;\n        int l=0, r = n-1;\n        while(l<r){\n            char temp = s[l];\n            s[l] = s[r];\n            s[r] = temp;\n            l++; r--;\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Next Permutation", "titleSlug": "next-permutation", "difficulty": "Medium", "tags": ["Array", "Two Pointers"], "runtime": 0, "memory": 47.1, "timestamp": 1779806261, "submissionCount": 2, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The algorithm identifies the rightmost ascent in the array to find the pivot, then locates the next greater element to swap with the pivot. Finally, it reverses the subarray after the pivot to achieve the next permutation in lexicographical order.", "improvements": null, "relatedPatterns": ["Greedy", "Backtracking"], "solutionCode": "// public class Solution {\n//     public void NextPermutation(int[] nums) {\n//         int ind = -1;\n//         int n = nums.Length;\n\n//         for (int i = n - 2; i >= 0; i--) {\n//             if (nums[i] < nums[i + 1]) {\n//                 ind = i;\n//                 break;\n//             }\n//         }\n\n//         if (ind == -1) {\n//             Array.Reverse(nums);\n//             return; \n//         }\n\n//         for (int i = n - 1; i > ind; i--) {\n//             if (nums[i] > nums[ind]) {\n//                 int temp = nums[i];\n//                 nums[i] = nums[ind];\n//                 nums[ind] = temp;\n//                 break;\n//             }\n//         }\n\n//         Array.Reverse(nums, ind + 1, n - ind - 1);\n//     }\n// }\n\npublic class Solution {\n    public void NextPermutation(int[] nums) {\n        int n = nums.Length; int breakPoint = -1;\n        for(int i = n-2;i>=0;i--){\n            if(nums[i]<nums[i+1]){\n                breakPoint = i;\n                break;\n            }\n        }\n        if(breakPoint==-1){\n            Array.Reverse(nums);\n            return;\n        }\n        else{\n            for(int i = n-1;i>breakPoint; i--){\n                if(nums[breakPoint]<nums[i]){\n                    (nums[breakPoint], nums[i]) = (nums[i], nums[breakPoint]);\n                    break;\n                }\n            }\n            Array.Reverse(nums, breakPoint+1, n-breakPoint-1);\n            return;\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Product of Array Except Self", "titleSlug": "product-of-array-except-self", "difficulty": "Medium", "tags": ["Array", "Prefix Sum"], "runtime": 1, "memory": 62.8, "timestamp": 1779803651, "submissionCount": 2, "pattern": "Prefix Product", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two passes to compute the product of all elements except the current one. In the first pass, it calculates the prefix product, and in the second pass, it multiplies the result with the suffix product, all while using a single output array.", "improvements": null, "relatedPatterns": ["Cumulative Sum", "Dynamic Programming"], "solutionCode": "public class Solution {\n    public int[] ProductExceptSelf(int[] nums) {\n\n    //     int n = nums.Length;\n\n    //     if (n == 0)\n    //         return new int[0];\n\n    //     int[] premul = new int[n];\n    //     int[] postmul = new int[n];\n\n    //     premul[0] = 1;\n    //     postmul[n - 1] = 1;\n\n    //     for (int i = 1; i < n; i++) {\n    //         premul[i] = premul[i - 1] * nums[i - 1];\n    //     }\n\n    //     for (int i = n - 2; i >= 0; i--) {\n    //         postmul[i] = postmul[i + 1] * nums[i + 1];\n    //     }\n\n    //     int[] res = new int[n];\n\n    //     for (int i = 0; i < n; i++) {\n    //         res[i] = premul[i] * postmul[i];\n    //     }\n\n    //     return res;\n    // }\n\n    int suffix = 1;\n    int n = nums.Length;\n    int[] res = new int[n];\n    res[0]=1;\n    for(int i = 1; i<n;i++){\n        res[i] = res[i-1]*nums[i-1];\n    }\n    for(int i=n-1;i>=0;i--){\n        res[i]*=suffix;\n        suffix*=nums[i];\n    }\n    return res;\n}\n}", "solutionExt": "cs"}, {"title": "Number of Zero-Filled Subarrays", "titleSlug": "number-of-zero-filled-subarrays", "difficulty": "Medium", "tags": ["Array", "Math"], "runtime": 2, "memory": 59.2, "timestamp": 1779722766, "submissionCount": 1, "pattern": "Iterative Counting", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the array while maintaining a count of consecutive zeros. For each zero encountered, it increments the count and adds it to the total, while resetting the count when a non-zero is found.", "improvements": null, "relatedPatterns": ["Sliding Window", "Prefix Sum"], "solutionCode": "public class Solution {\n    public long ZeroFilledSubarray(int[] nums) {\n        long count = 0;\n        long total = 0;\n\n        foreach (int num in nums) {\n            if (num == 0) {\n                count++;\n                total += count;\n            } else {\n                count = 0;\n            }\n        }\n\n        return total;\n    }\n}", "solutionExt": "cs"}, {"title": "Best Time to Buy and Sell Stock II", "titleSlug": "best-time-to-buy-and-sell-stock-ii", "difficulty": "Medium", "tags": ["Array", "Dynamic Programming", "Greedy"], "runtime": 0, "memory": 43.7, "timestamp": 1779720359, "submissionCount": 1, "pattern": "Greedy", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the prices array and accumulates profit whenever the current price is higher than the previous price. This greedy approach ensures that all profitable transactions are captured without needing to track individual buy and sell days.", "improvements": null, "relatedPatterns": ["Dynamic Programming"], "solutionCode": "public class Solution {\n    public int MaxProfit(int[] prices) {\n        // brute\n        // return Solve(prices, 0, false);\n        int profit = 0;\n        for(int i = 1; i<prices.Length;i++){\n            if(prices[i]>prices[i-1]){\n                profit+=prices[i]-prices[i-1];\n            }\n        }\n        return profit;\n    }\n    // brute\n    public int Solve(int[] prices, int day, bool holding){\n        if (day == prices.Length) return 0;\n        if(holding){\n            int sell = prices[day]+Solve(prices, day+1, false);\n            int hold = Solve(prices, day+1,true);\n            return Math.Max(sell, hold);\n        }\n        else{\n            int buy = -prices[day]+Solve(prices, day+1, true);\n            int skip = Solve(prices, day+1,false);\n            return Math.Max(buy, skip);\n        }\n    }\n\n\n}", "solutionExt": "cs"}, {"title": "Majority Element II", "titleSlug": "majority-element-ii", "difficulty": "Medium", "tags": ["Array", "Hash Table", "Sorting", "Counting"], "runtime": 1, "memory": 52.2, "timestamp": 1779154113, "submissionCount": 1, "pattern": "Boyer-Moore Voting Algorithm", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a modified Boyer-Moore Voting Algorithm to identify potential majority elements by maintaining two candidate elements and their counts. It then verifies if these candidates appear more than n/3 times in the array.", "improvements": null, "relatedPatterns": ["Hash Table", "Counting"], "solutionCode": "public class Solution {\n    public IList<int> MajorityElement(int[] nums) {\n        if(nums.Length == 1) return new List<int>{nums[0]};\n        int count1 = 0, count2 = 0, res1 = 0, res2=0;\n        foreach(int num in nums){\n            if(num==res1) count1++;\n            else if(num==res2) count2++;\n            else if(count1 ==0){\n                res1 = num;\n                count1++;\n            }\n            else if(count2==0){\n                res2 = num;\n                count2++;\n            }\n            else{\n                count1--;\n                count2--;\n            }\n        }\n\n        count1=0;count2=0;\n        foreach(int num in nums){\n            if(num == res1)count1++;\n            if(res1!=res2 && num == res2)count2++;\n        }\n        var res = new List<int>();\n        if(count1>nums.Length/3) res.Add(res1);\n        if(count2>nums.Length/3) res.Add(res2);\n\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Majority Element", "titleSlug": "majority-element", "difficulty": "Easy", "tags": ["Array", "Hash Table", "Divide and Conquer", "Sorting", "Counting"], "runtime": 0, "memory": 46.3, "timestamp": 1779151723, "submissionCount": 1, "pattern": "Boyer-Moore Voting Algorithm", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The algorithm maintains a count of the current candidate for the majority element. It increments the count when the current element matches the candidate and decrements it otherwise. When the count reaches zero, it updates the candidate to the current element.", "improvements": null, "relatedPatterns": ["Hash Table", "Sorting"], "solutionCode": "public class Solution {\n    public int MajorityElement(int[] nums) {\n        if(nums.Length ==1) return nums[0];\n        int count=0, res = nums[0];\n\n        for(int i = 0; i< nums.Length; i++){\n            if(count == 0 ){\n                res = nums[i];\n            }\n            count += nums[i] == res?1:-1;\n        }\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Third Maximum Number", "titleSlug": "third-maximum-number", "difficulty": "Easy", "tags": ["Array", "Sorting"], "runtime": 0, "memory": 43.6, "timestamp": 1779119346, "submissionCount": 1, "pattern": "Single Pass with Conditional Updates", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the array while maintaining the top three unique maximum values using long variables to avoid integer overflow. It skips duplicates and updates the maximums accordingly, ensuring that the third maximum is returned if it exists, or the maximum otherwise.", "improvements": null, "relatedPatterns": ["Sorting", "Heap"], "solutionCode": "public class Solution {\n    public int ThirdMax(int[] nums) {\n        // Use long to avoid sentinel collision with int.MinValue\n        long first = long.MinValue;\n        long second = long.MinValue;\n        long third = long.MinValue;\n\n        foreach (int num in nums) {\n            // Skip duplicates\n            if (num == first || num == second || num == third) {\n                continue;\n            }\n            if (num > first) {\n                // New largest: shift everything down\n                third = second;\n                second = first;\n                first = num;\n            } else if (num > second) {\n                // New second largest: shift third down\n                third = second;\n                second = num;\n            } else if (num > third) {\n                // New third largest\n                third = num;\n            }\n        }\n\n        // If third was never assigned, return the maximum\n        return (int)(third == long.MinValue ? first : third);\n    }\n}", "solutionExt": "cs"}, {"title": "Max Consecutive Ones", "titleSlug": "max-consecutive-ones", "difficulty": "Easy", "tags": ["Array"], "runtime": 1, "memory": 50.4, "timestamp": 1779068773, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through the array while maintaining a count of consecutive ones. When a zero is encountered, it compares the current count of ones with the maximum found so far and resets the current count.", "improvements": null, "relatedPatterns": ["Sliding Window"], "solutionCode": "public class Solution {\n    public int FindMaxConsecutiveOnes(int[] nums) {\n        int max=0, curr = 0, n = nums.Length;\n        for(int i=0;i<n;i++){\n            if(nums[i]!=1){\n                if(curr>max){\n                    max = curr;\n                }\n                curr=0;\n            }\n            else{\n                curr++;\n            }\n        }\n        return curr>max?curr:max;\n    }\n}", "solutionExt": "cs"}, {"title": "Rotate Array", "titleSlug": "rotate-array", "difficulty": "Medium", "tags": ["Array", "Math", "Two Pointers"], "runtime": 0, "memory": 64.7, "timestamp": 1779048947, "submissionCount": 1, "pattern": "Array Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses the reverse method to rotate the array in three steps: first reversing the entire array, then reversing the first part, and finally reversing the second part. This effectively shifts the elements to their new positions in a single pass.", "improvements": null, "relatedPatterns": ["Two Pointers", "In-Place Algorithm"], "solutionCode": "public class Solution {\n    public void Rotate(int[] nums, int k) {\n        int n = nums.Length;\n        if(n<=1) return;\n        k%=n;\n\n        Array.Reverse(nums,0,n-k);\n        Array.Reverse(nums,n-k,k);\n        Array.Reverse(nums, 0, n);\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Duplicates from Sorted Array II", "titleSlug": "remove-duplicates-from-sorted-array-ii", "difficulty": "Medium", "tags": ["Array", "Two Pointers"], "runtime": 143, "memory": 53.1, "timestamp": 1779025647, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique to traverse the sorted array while maintaining the allowed duplicates. It checks if the current element is different from the element two places back, and if so, it updates the next position for valid elements.", "improvements": null, "relatedPatterns": ["Array Manipulation"], "solutionCode": "public class Solution {\n    public int RemoveDuplicates(int[] nums) {\n        if (nums.Length <= 2)\n        return nums.Length;\n\n        int n = nums.Length, x = 2;\n        for(int i=2;i<n;i++){\n            if(nums[i]!=nums[x-2]){\n                nums[x] = nums[i];\n                x++;\n            }\n        }\n        return x;\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Duplicates from Sorted Array", "titleSlug": "remove-duplicates-from-sorted-array", "difficulty": "Easy", "tags": ["Array", "Two Pointers"], "runtime": 0, "memory": 51.6, "timestamp": 1779024047, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique where one pointer tracks the position of unique elements and the other iterates through the array. When a new unique element is found, it is placed at the next position of the unique pointer, effectively removing duplicates in place.", "improvements": null, "relatedPatterns": ["In-place Algorithm", "Array Manipulation"], "solutionCode": "public class Solution {\n    public int RemoveDuplicates(int[] nums) {\n        int x = 0, n = nums.Length;\n        for(int i=0;i<n;i++){\n            if(nums[x]!=nums[i]){\n                x+=1;\n                nums[x] = nums[i];\n            }\n        }\n        return x+1;\n    }\n}", "solutionExt": "cs"}, {"title": "Shuffle the Array", "titleSlug": "shuffle-the-array", "difficulty": "Easy", "tags": ["Array"], "runtime": 138, "memory": 49.4, "timestamp": 1779023512, "submissionCount": 1, "pattern": "In-place Array Manipulation", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution modifies the input array in-place by encoding the second half of the array into the first half using a mathematical trick. It uses a maximum value to ensure that both original and new values can coexist in the same array until the final division step.", "improvements": null, "relatedPatterns": ["Array Reordering", "In-place Algorithms"], "solutionCode": "public class Solution {\n    public int[] Shuffle(int[] nums, int n) {\n        int maxVal = 1001;\n        for(int i = n-1;i>=0;i--){\n            nums[2*i+1] += (nums[n+i]%maxVal)*maxVal;\n            nums[2*i]+=(nums[i]%maxVal)*maxVal;\n        }\n        \n        for(int i=0;i<2*n;i++){\n            nums[i]/=maxVal;\n        }\n        return nums;\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Element", "titleSlug": "remove-element", "difficulty": "Easy", "tags": ["Array", "Two Pointers"], "runtime": 0, "memory": 46.5, "timestamp": 1778997808, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses a two-pointer technique where one pointer iterates through the array and the other keeps track of the position to place elements that are not equal to the target value. When a non-target value is found, it is swapped with the value at the second pointer's position, and the second pointer is incremented.", "improvements": null, "relatedPatterns": ["In-place Modification", "Partitioning"], "solutionCode": "public class Solution {\n    public int RemoveElement(int[] nums, int val) {\n        int n = nums.Length, k=0;\n\n        for(int i = 0;i<n;i++){\n            if(nums[i]!=val){\n                if(i!=k){\n                    (nums[i], nums[k])=(nums[k], nums[i]);\n                }\n                k++;\n            }\n        }\n        return k;\n    }\n}", "solutionExt": "cs"}, {"title": "Move Zeroes", "titleSlug": "move-zeroes", "difficulty": "Easy", "tags": ["Array", "Two Pointers"], "runtime": 1, "memory": 58.1, "timestamp": 1778996274, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The algorithm uses a two-pointer technique where one pointer tracks the position of non-zero elements and the other iterates through the array. When a non-zero element is found, it is swapped with the element at the 'nonZero' pointer, effectively moving all zeros to the end of the array.", "improvements": null, "relatedPatterns": ["In-place Algorithm", "Array Manipulation"], "solutionCode": "public class Solution {\n    public void MoveZeroes(int[] nums) {\n        int nonZero = 0;\n        for(int i= 0;i<nums.Length;i++){\n            if(nums[i]!=0){\n                (nums[i], nums[nonZero]) = (nums[nonZero], nums[i]);\n                nonZero++;\n            }\n        }\n    }\n}", "solutionExt": "cs"}, {"title": "Remove K Digits", "titleSlug": "remove-k-digits", "difficulty": "Medium", "tags": ["String", "Stack", "Greedy", "Monotonic Stack"], "runtime": 10, "memory": 45.3, "timestamp": 1775710424, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a monotonic stack to maintain the digits in a non-decreasing order while iterating through the number. It removes digits from the stack when the current digit is smaller than the top of the stack and there are still digits left to remove (k > 0).", "improvements": null, "relatedPatterns": ["Greedy", "Stack"], "solutionCode": "public class Solution {\n    public string RemoveKdigits(string num, int k) {\n        if(k>=num.Length) return \"0\";\n        int n = num.Length; Stack<char> st = new Stack<char>();\n\n        for(int i=0;i<n;i++){\n            while(k>0 && st.Count!=0 && st.Peek()>num[i]){\n                st.Pop();k-=1;\n            }\n            st.Push(num[i]);\n        }\n\n        while(k>0){\n            st.Pop();k-=1;\n        }\n\n        var result = new string(st.Reverse().ToArray());\n        result = result.TrimStart('0');\n\n        return result == \"\"?\"0\":result;\n        \n    }\n}", "solutionExt": "cs"}, {"title": "Asteroid Collision", "titleSlug": "asteroid-collision", "difficulty": "Medium", "tags": ["Array", "Stack", "Simulation"], "runtime": 7, "memory": 50.7, "timestamp": 1775708382, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a stack to simulate the collision of asteroids. Positive asteroids are pushed onto the stack, and when a negative asteroid is encountered, collisions are resolved based on their sizes until no further collisions can occur.", "improvements": null, "relatedPatterns": ["Stack", "Simulation"], "solutionCode": "public class Solution {\n    public int[] AsteroidCollision(int[] asteroids) {\n        Stack<int> st = new Stack<int>();\n\n        foreach (var item in asteroids) {\n            int curr = item;\n\n            while (st.Count != 0 && st.Peek() > 0 && curr < 0) {\n                if (st.Peek() + curr < 0) {\n                    st.Pop();\n                }\n                else if (st.Peek() + curr == 0) {\n                    st.Pop();\n                    curr = 0;\n                    break;\n                }\n                else {\n                    curr = 0;\n                    break;\n                }\n            }\n\n            if (curr != 0) {\n                st.Push(curr);\n            }\n        }\n\n        return st.Reverse().ToArray();\n    }\n}", "solutionExt": "cs"}, {"title": "Sum of Subarray Ranges", "titleSlug": "sum-of-subarray-ranges", "difficulty": "Medium", "tags": ["Array", "Stack", "Monotonic Stack"], "runtime": 12, "memory": 43.9, "timestamp": 1775625324, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses monotonic stacks to efficiently find the next and previous smaller and greater elements for each element in the array. This allows the calculation of contributions to the sum of subarray ranges by determining how many subarrays each element is the maximum or minimum for.", "improvements": null, "relatedPatterns": ["Stack", "Dynamic Programming"], "solutionCode": "public class Solution {\n    public long SubArrayRanges(int[] nums) {\n        int[] nse = findNse(nums);\n        int[] psee = findPsee(nums);\n        int[] nge = findNge(nums);\n        int[] pgee = findPgee(nums);\n\n        int n = nums.Length;long sum = 0;\n\nfor(int i = 0; i < n; i++){\n    long smallLeft = i - psee[i];\n    long smallRight = nse[i] - i;\n    long largeLeft = i - pgee[i];\n    long largeRight = nge[i] - i;\n\n    long smallContribution = smallLeft * smallRight * nums[i];\n    long largeContribution = largeLeft * largeRight * nums[i];\n\n    sum += (largeContribution - smallContribution);\n}\n\n        return sum;\n    }\n\n    int[] findNse(int[] arr){\n        int n = arr.Length;int i = n-1; \n        Stack<int> st = new Stack<int>();\n        int[] nse = new int[n];\n        while(i>=0){\n            while(st.Count!=0 && arr[st.Peek()]>=arr[i]){\n                st.Pop();\n            }\n\n            nse[i] = st.Count==0?n:st.Peek();\n            st.Push(i);\n            i-=1;\n        }\n        return nse;\n    }\n\n    int[] findPsee(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n=arr.Length; int[] psee = new int[n];\n\n        for(int i=0;i<n;i++){\n            while(st.Count!=0 && arr[st.Peek()]>arr[i]){\n                st.Pop();\n            }\n            psee[i] = st.Count==0?-1:st.Peek();\n            st.Push(i);\n        }\n        return psee;\n    }\n\n    int[] findNge(int[] arr){\n        Stack<int> st = new Stack<int>();int n = arr.Length;\n        int[] nge = new int[n];int i = n-1;\n\n        while(i>=0){\n            while(st.Count!=0 && arr[st.Peek()]<=arr[i]){\n                st.Pop();\n            }\n            nge[i] = st.Count==0?n:st.Peek();\n            st.Push(i);\n            i-=1;\n        }\n\n        return nge;\n    }\n\n    int[] findPgee(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n=arr.Length; int[] pgee = new int[n];\n\n        for(int i=0;i<n;i++){\n            while(st.Count!=0 && arr[st.Peek()]<arr[i]){\n                st.Pop();\n            }\n            pgee[i] = st.Count==0?-1:st.Peek();\n            st.Push(i);\n        }\n        return pgee;\n    }\n}", "solutionExt": "cs"}, {"title": "Sum of Subarray Minimums", "titleSlug": "sum-of-subarray-minimums", "difficulty": "Medium", "tags": ["Array", "Dynamic Programming", "Stack", "Monotonic Stack"], "runtime": 15, "memory": 50.4, "timestamp": 1775546931, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses two monotonic stacks to find the next smaller element (NSE) and previous smaller element (PSE) for each element in the array. This allows for efficient calculation of the contribution of each element to the sum of subarray minimums based on its position relative to these boundaries.", "improvements": null, "relatedPatterns": ["Dynamic Programming", "Stack"], "solutionCode": "public class Solution {\n    public int SumSubarrayMins(int[] arr) {\n        int[] nse = findNse(arr);\n        int[] psee = findPsee(arr);\n        long MOD = (long)1e9 + 7;\n        long sum = 0;\n\n        for(int i = 0; i < arr.Length; i++){\n            int left = i - psee[i];\n            int right = nse[i] - i;\n\n            long contribution = ((long)left * right) % MOD;\n            contribution = (contribution * arr[i]) % MOD;\n\n            sum = (sum + contribution) % MOD;\n        }\n\n        return (int)sum;\n    }\n\n    int[] findNse(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n = arr.Length;\n        int[] nse = new int[n];\n\n        for(int i = n - 1; i >= 0; i--){\n            while(st.Count != 0 && arr[st.Peek()] >= arr[i]){\n                st.Pop();\n            }\n            nse[i] = st.Count == 0 ? n : st.Peek();\n            st.Push(i);\n        }\n\n        return nse;\n    }\n\n    int[] findPsee(int[] arr){\n        Stack<int> st = new Stack<int>();\n        int n = arr.Length;\n        int[] psee = new int[n];\n\n        for(int i = 0; i < n; i++){\n            while(st.Count != 0 && arr[st.Peek()] > arr[i]){\n                st.Pop();\n            }\n            psee[i] = st.Count == 0 ? -1 : st.Peek();\n            st.Push(i);\n        }\n\n        return psee;\n    }\n}", "solutionExt": "cs"}, {"title": "Trapping Rain Water", "titleSlug": "trapping-rain-water", "difficulty": "Hard", "tags": ["Array", "Two Pointers", "Dynamic Programming", "Stack", "Monotonic Stack"], "runtime": 0, "memory": 46.9, "timestamp": 1775448892, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The algorithm uses two pointers to traverse the array from both ends towards the center. It maintains the maximum heights encountered from both sides to calculate the trapped water at each position based on the minimum of the two maximums.", "improvements": null, "relatedPatterns": ["Dynamic Programming", "Monotonic Stack"], "solutionCode": "public class Solution {\n    public int Trap(int[] heights) {\n        int total = 0, lmax = 0, rmax = 0, l = 0;\n        int r = heights.Length-1;\n\n        while(l<r){\n            if(heights[l]<heights[r]){\n                if(lmax>heights[l]) total+=lmax-heights[l];\n                else lmax = heights[l];\n                l+=1;\n            }\n            else{\n                if(rmax>heights[r]) total+=rmax-heights[r];\n                else rmax = heights[r];\n                r-=1;\n            }\n        }\n\n        return total;\n    }\n}", "solutionExt": "cs"}, {"title": "Next Greater Element II", "titleSlug": "next-greater-element-ii", "difficulty": "Medium", "tags": ["Array", "Stack", "Monotonic Stack"], "runtime": 8, "memory": 61.3, "timestamp": 1775438214, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n)", "spaceComplexity": "O(n)", "explanation": "The solution uses a monotonic stack to keep track of the next greater elements in a circular array. By iterating through the array twice, it ensures that all elements are considered while efficiently finding the next greater element for each.", "improvements": null, "relatedPatterns": ["Stack", "Circular Array"], "solutionCode": "public class Solution {\n    public int[] NextGreaterElements(int[] nums) {\n        int n = nums.Length;\n        int[] res = new int[n];\n        Array.Fill(res, -1);\n\n        Stack<int> st = new Stack<int>();\n\n        for (int i = 2 * n - 1; i >= 0; i--) {\n            int num = nums[i % n];\n\n            while (st.Count != 0 && st.Peek() <= num) {\n                st.Pop();\n            }\n\n            if (i < n) {\n                res[i] = st.Count == 0 ? -1 : st.Peek();\n            }\n\n            st.Push(num);\n        }\n\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Next Greater Element I", "titleSlug": "next-greater-element-i", "difficulty": "Easy", "tags": ["Array", "Hash Table", "Stack", "Monotonic Stack"], "runtime": 2, "memory": 47.0, "timestamp": 1775436992, "submissionCount": 1, "pattern": "Monotonic Stack", "timeComplexity": "O(n + m)", "spaceComplexity": "O(n)", "explanation": "The solution uses a monotonic stack to find the next greater element for each element in nums2. It iterates through nums2 in reverse, maintaining a stack of elements to efficiently determine the next greater element for each number.", "improvements": null, "relatedPatterns": ["Hash Table", "Array"], "solutionCode": "public class Solution {\n    public int[] NextGreaterElement(int[] nums1, int[] nums2) {\n        Dictionary<int, int> neg = new Dictionary<int, int>(); \n        int[] res = new int[nums1.Length];\n        Stack<int> st = new Stack<int>();\n\n        int i = nums2.Length - 1;\n\n        while (i >= 0) {\n            while (st.Count != 0 && st.Peek() <= nums2[i]) {\n                st.Pop();\n            }\n\n            if (st.Count == 0)\n                neg[nums2[i]] = -1;\n            else\n                neg[nums2[i]] = st.Peek();\n\n            st.Push(nums2[i]);\n            i--;\n        }\n\n        for (int j = 0; j < nums1.Length; j++) {\n            res[j] = neg[nums1[j]];\n        }\n\n        return res;\n    }\n}", "solutionExt": "cs"}, {"title": "Reverse Nodes in k-Group", "titleSlug": "reverse-nodes-in-k-group", "difficulty": "Hard", "tags": ["Linked List", "Recursion"], "runtime": 0, "memory": 46.8, "timestamp": 1775276513, "submissionCount": 1, "pattern": "Recursion", "timeComplexity": "O(n)", "spaceComplexity": "O(n/k)", "explanation": "The algorithm recursively processes the linked list in groups of k nodes. It first checks if there are enough nodes to reverse; if so, it reverses the current group and connects it to the result of the next group.", "improvements": "Consider using an iterative approach to reduce the space complexity from O(n/k) to O(1).", "relatedPatterns": ["Linked List", "Two Pointers"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode ReverseKGroup(ListNode head, int k) {\n        if (head == null) return head;\n\n        ListNode temp = head, end = head;\n        int counter = k;\n\n        // Move 'end' to kth node\n        while (counter > 1 && end != null) {\n            end = end.next;\n            counter--;\n        }\n\n        // If less than k nodes\n        if (end == null) return head;\n\n        ListNode nextGroup = end.next;\n        end.next = null;\n\n        // Reverse current k group\n        ListNode newHead = reverse(temp);\n\n        // Connect with next groups\n        temp.next = ReverseKGroup(nextGroup, k);\n\n        return newHead;\n    }\n\n    ListNode reverse(ListNode head) {\n        if (head == null || head.next == null) return head;\n\n        ListNode newHead = reverse(head.next);\n        head.next.next = head;\n        head.next = null;\n\n        return newHead;\n    }\n}", "solutionExt": "cs"}, {"title": "Sort List", "titleSlug": "sort-list", "difficulty": "Medium", "tags": ["Linked List", "Two Pointers", "Divide and Conquer", "Sorting", "Merge Sort"], "runtime": 32, "memory": 75.3, "timestamp": 1775187496, "submissionCount": 1, "pattern": "Merge Sort", "timeComplexity": "O(n log n)", "spaceComplexity": "O(log n)", "explanation": "The solution uses the Merge Sort algorithm to sort a linked list. It recursively divides the list into halves until it reaches base cases of single nodes, then merges the sorted halves back together.", "improvements": null, "relatedPatterns": ["Divide and Conquer", "Two Pointers"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode SortList(ListNode head) {\n        if(head==null || head.next==null) return head;\n        return MergeSort(head);\n    }\n\n    ListNode MergeSort(ListNode head){\n        if(head==null || head.next==null) return head;\n\n        ListNode middle = FindMiddle(head);\n        ListNode leftHead = head, rightHead = middle.next;\n        middle.next = null;\n        leftHead = MergeSort(leftHead);\n        rightHead = MergeSort(rightHead);\n        return Merge(leftHead, rightHead);\n    }\n\n    ListNode FindMiddle(ListNode head){\n        ListNode slow = head, fast = head.next;\n        while(fast!=null && fast.next!=null){\n            slow = slow.next;\n            fast = fast.next.next;\n        }\n        return slow;\n    }\n\n    ListNode Merge(ListNode lefthead, ListNode righthead){\n        ListNode dummy = new ListNode(-1);\n        ListNode temp1 = lefthead, temp2 = righthead, head = dummy;\n        while(temp1!=null && temp2!=null){\n            if(temp1.val<=temp2.val){\n                head.next = temp1;\n                temp1 = temp1.next;\n            }\n            else{\n                head.next = temp2;\n                temp2 = temp2.next;\n            }\n            head = head.next;\n        }\n        head.next = temp1==null?temp2:temp1;\n        return dummy.next;\n    }\n}", "solutionExt": "cs"}, {"title": "Remove Nth Node From End of List", "titleSlug": "remove-nth-node-from-end-of-list", "difficulty": "Medium", "tags": ["Linked List", "Two Pointers"], "runtime": 0, "memory": 42.7, "timestamp": 1774963588, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(L), where L is the length of the linked list", "spaceComplexity": "O(1)", "explanation": "The solution first calculates the length of the linked list. Then, it determines the position of the node to be removed by traversing the list again, allowing for direct access to the node before the target node.", "improvements": "Instead of calculating the length first, a single pass can be used with two pointers to find the node to remove, which would eliminate the need for the length variable.", "relatedPatterns": ["Single Pass", "Linked List"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode RemoveNthFromEnd(ListNode head, int n) {\n        ListNode curr = head;\n        int length = 0;\n        while(curr!=null){\n            ++length;curr= curr.next;\n        }\n\n        int traverseLength = length-n-1;\n        curr = head;\n        if(traverseLength==-1){\n            return head.next;\n        }\n        while(traverseLength>0){\n            curr = curr.next;--traverseLength;\n        }\n        curr.next = curr.next.next;\n        return head;\n    }\n}", "solutionExt": "cs"}, {"title": "Odd Even Linked List", "titleSlug": "odd-even-linked-list", "difficulty": "Medium", "tags": ["Linked List"], "runtime": 0, "memory": 47.2, "timestamp": 1774961479, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers to separate the odd and even indexed nodes in a linked list. It iterates through the list, adjusting the next pointers of the odd and even nodes, and finally connects the end of the odd list to the head of the even list.", "improvements": null, "relatedPatterns": ["Linked List", "In-Place Reordering"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode OddEvenList(ListNode head) {\n        if(head == null || head.next ==null) return head;\n        ListNode odd = head, even = head.next;\n        ListNode ehead = even;\n        while(even!=null && even.next!=null){\n            odd.next = odd.next.next;\n            even.next=even.next.next;\n            odd = odd.next;\n            even = even.next;\n        }\n        odd.next = ehead;\n        return head;\n    }\n}", "solutionExt": "cs"}, {"title": "Linked List Cycle II", "titleSlug": "linked-list-cycle-ii", "difficulty": "Medium", "tags": ["Hash Table", "Linked List", "Two Pointers"], "runtime": 93, "memory": 47.8, "timestamp": 1774939933, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers, slow and fast, to detect a cycle in the linked list. If a cycle exists, the two pointers will meet at some point, allowing the algorithm to find the start of the cycle by resetting one pointer to the head and moving both pointers at the same speed until they meet again.", "improvements": null, "relatedPatterns": ["Floyd's Tortoise and Hare", "Linked List"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int x) {\n *         val = x;\n *         next = null;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode DetectCycle(ListNode head) {\n        ListNode slow = head, fast = head;\n        while(fast!=null && fast.next!=null){\n            slow = slow.next ;\n            fast = fast.next.next;\n\n            if(slow == fast){\n                slow = head;\n                while(slow!=fast){\n                    slow = slow.next;\n                    fast = fast.next;\n                }\n                return slow;\n            }\n        }\n        return null;\n    }\n}", "solutionExt": "cs"}, {"title": "Linked List Cycle", "titleSlug": "linked-list-cycle", "difficulty": "Easy", "tags": ["Hash Table", "Linked List", "Two Pointers"], "runtime": 96, "memory": 48.9, "timestamp": 1774939523, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses the Floyd's Tortoise and Hare algorithm, where two pointers traverse the linked list at different speeds. If there is a cycle, the fast pointer will eventually meet the slow pointer; otherwise, the fast pointer will reach the end of the list.", "improvements": null, "relatedPatterns": ["Linked List", "Hash Table"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int x) {\n *         val = x;\n *         next = null;\n *     }\n * }\n */\npublic class Solution {\n    public bool HasCycle(ListNode head) {\n        if(head == null) return false;\n        ListNode slow = head, fast = head;\n        while( fast?.next!=null){\n            slow = slow?.next;\n            fast = fast?.next.next;\n            if(slow == fast){\n                return true;\n            }\n        }\n\n        return false;\n    }\n}", "solutionExt": "cs"}, {"title": "Middle of the Linked List", "titleSlug": "middle-of-the-linked-list", "difficulty": "Easy", "tags": ["Linked List", "Two Pointers"], "runtime": 0, "memory": 41.3, "timestamp": 1774938935, "submissionCount": 1, "pattern": "Two Pointers", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses two pointers, slow and fast, to traverse the linked list. The slow pointer moves one step at a time while the fast pointer moves two steps, allowing the slow pointer to reach the middle of the list when the fast pointer reaches the end.", "improvements": null, "relatedPatterns": ["Linked List", "Fast and Slow Pointers"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode MiddleNode(ListNode head) {\n        ListNode slow = head;\n        ListNode fast = head;\n        while(fast!=null && fast.next!=null){\n            slow = slow.next;\n            fast = fast.next.next;\n        }\n        return slow;\n    }\n}", "solutionExt": "cs"}, {"title": "Reverse Linked List", "titleSlug": "reverse-linked-list", "difficulty": "Easy", "tags": ["Linked List", "Recursion"], "runtime": 0, "memory": 43.0, "timestamp": 1774938746, "submissionCount": 1, "pattern": "Iterative", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution uses an iterative approach to reverse the linked list by maintaining pointers to the current node, previous node, and the next node. It iteratively updates the next pointer of each node to point to the previous node until all nodes are reversed.", "improvements": null, "relatedPatterns": ["Recursion"], "solutionCode": "/**\n * Definition for singly-linked list.\n * public class ListNode {\n *     public int val;\n *     public ListNode next;\n *     public ListNode(int val=0, ListNode next=null) {\n *         this.val = val;\n *         this.next = next;\n *     }\n * }\n */\npublic class Solution {\n    public ListNode ReverseList(ListNode head) {\n        ListNode temp = head, prev = null;\n        while(temp!=null){\n            ListNode front = temp.next;\n            temp.next = prev;\n            prev= temp;\n            temp = front;\n        }\n        return prev;\n    }\n}", "solutionExt": "cs"}, {"title": "Roman to Integer", "titleSlug": "roman-to-integer", "difficulty": "Easy", "tags": ["Hash Table", "Math", "String"], "runtime": 8, "memory": 49.1, "timestamp": 1774839671, "submissionCount": 1, "pattern": "Iterative", "timeComplexity": "O(n)", "spaceComplexity": "O(1)", "explanation": "The solution iterates through each character of the Roman numeral string, converting each character to its integer value using a helper function. It checks if the current value is less than t
